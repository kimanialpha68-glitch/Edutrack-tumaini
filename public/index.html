                  <div style={{overflowX:'auto',maxHeight:360,overflowY:'auto',borderRadius:8,border:'1px solid var(--border)',marginBottom:14}}>
                    <table style={{width:'100%',borderCollapse:'collapse',fontSize:'0.7rem',minWidth:480}}>
                      <thead style={{position:'sticky',top:0,zIndex:1}}>
                        <tr style={{background:'var(--navy)',borderBottom:'1px solid var(--border)'}}>
                          <th style={{padding:'7px 10px',textAlign:'left',color:'var(--text2)',fontWeight:600,fontSize:'0.62rem',textTransform:'uppercase',whiteSpace:'nowrap'}}>Student</th>
                          {customSubjects.map(s=>(
                            <th key={s} style={{padding:'7px 8px',textAlign:'center',color:'var(--text2)',fontWeight:600,fontSize:'0.6rem',whiteSpace:'nowrap',maxWidth:56}}>{s.split(' ')[0].slice(0,8)}</th>
                          ))}
                          <th style={{padding:'7px 8px',textAlign:'center',color:'var(--gold)',fontWeight:700,fontSize:'0.62rem'}}>Avg</th>
                          <th style={{padding:'7px 8px',textAlign:'center',fontSize:'0.62rem',color:'var(--text2)'}}>Status</th>
                        </tr>
                      </thead>
                      <tbody>
                        {previewRows.map((r,i)=>{
                          const scores=r.subjects.filter(s=>s.score!==null).map(s=>s.score);
                          const avg=scores.length?Math.round(scores.reduce((a,b)=>a+b,0)/scores.length):null;
                          const perf=avg!==null?getCBCLevel(importGrade,avg):null;
                          return(
                            <tr key={i} style={{borderBottom:'1px solid var(--border)',background:r._ok?'transparent':'rgba(239,68,68,0.05)'}}>
                              <td style={{padding:'7px 10px',fontWeight:700,whiteSpace:'nowrap'}}>{r.studentName}</td>
                              {r.subjects.map((s,j)=>(
                                <td key={j} style={{padding:'7px 8px',textAlign:'center',color:s.score!==null?(getCBCLevel(importGrade,s.score).color||'var(--text)'):'var(--text2)',fontWeight:s.score!==null?700:400}}>
                                  {s.score!==null?s.score:'—'}
                                </td>
                              ))}
                              <td style={{padding:'7px 8px',textAlign:'center',fontWeight:800,color:perf?.color||'var(--text2)'}}>
                                {avg!==null?`${avg}%`:'—'}
                              </td>
                              <td style={{padding:'7px 8px',textAlign:'center'}}>
                                {r._ok
                                  ? <span style={{color:'var(--green)',fontWeight:700,fontSize:'0.68rem'}}>✅</span>
                                  : <span style={{color:'var(--rose)',fontWeight:700,fontSize:'0.68rem'}} title={r._warn}>❌</span>}
                              </td>
                            </tr>
                          );
                        })}
                      </tbody>
                    </table>
                  </div>
                  {previewRows.some(r=>!r._ok)&&(
                    <div style={{fontSize:'0.72rem',color:'var(--rose)',marginBottom:12}}>
                      ❌ Skipped rows: student name not found in {importGrade} — make sure names match exactly what's in the system.
                    </div>
                  )}
                  <div style={{display:'flex',gap:10}}>
                    <button className="btn btn-outline" onClick={()=>setImportStep(2)}>← Back</button>
                    <button className="btn btn-gold" style={{flex:1,justifyContent:'center'}} onClick={confirmImport} disabled={previewRows.filter(r=>r._ok).length===0}>
                      ✅ Import {previewRows.filter(r=>r._ok).length} Record{previewRows.filter(r=>r._ok).length!==1?'s':''}
                    </button>
                  </div>
                </div>
              )}
            </div>
          </div>
        </div>
      )}
    </div>
  );

  // ── Record new exam view ──────────────────────────────────────
  if(view === 'record' && examForm) return (
    <div>
      <button className="btn btn-outline btn-sm" style={{marginBottom:14}} onClick={()=>setView('list')}>← Back</button>
      <div className="card">
        <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:16}}>
          <div style={{width:40,height:40,borderRadius:'50%',background:'linear-gradient(135deg,var(--gold),var(--gold2))',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'1.2rem',flexShrink:0}}>
            {selectedStudent.gender==='Female'?'👧':'👦'}
          </div>
          <div>
            <div style={{fontWeight:700}}>{selectedStudent.name}</div>
            <span className={`badge badge-${LEVEL_COLOR[GRADE_LEVEL[selectedStudent.grade]]||'teal'}`}>{selectedStudent.grade}</span>
          </div>
        </div>

        <div style={{background:'rgba(234,179,8,0.08)',border:'1px solid rgba(234,179,8,0.2)',borderRadius:8,padding:'9px 12px',marginBottom:14,fontSize:'0.75rem',color:'var(--text2)'}}>
          📚 <strong style={{color:'var(--gold)'}}>KICD CBC</strong> — {useMarks(selectedStudent.grade)?'Marks out of 100 → Letter grade A–E':'Performance levels: EE / ME / AE / BE'}
        </div>

        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:10,marginBottom:14}}>
          {[
            {label:'Year', key:'year', opts:YEARS},
            {label:'Term', key:'term', opts:TERMS},
            {label:'Exam Type', key:'examType', opts:EXAM_TYPES},
          ].map(({label,key,opts})=>(
            <div key={key}>
              <label style={{fontSize:'0.68rem',color:'var(--text2)',fontWeight:700,textTransform:'uppercase',letterSpacing:'0.8px',display:'block',marginBottom:5}}>{label}</label>
              <select value={examForm[key]} onChange={e=>setExamForm(p=>({...p,[key]:e.target.value}))}>
                {opts.map(o=><option key={o}>{o}</option>)}
              </select>
            </div>
          ))}
        </div>

        <div style={{fontSize:'0.68rem',color:'var(--text2)',fontWeight:700,textTransform:'uppercase',letterSpacing:'0.8px',marginBottom:10}}>Subject Scores (0–100)</div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:16}}>
          {examForm.subjects.map((subj,i)=>{
            const perf = subj.score!==''&&subj.score!==null ? getCBCLevel(selectedStudent.grade, Number(subj.score)) : null;
            return(
              <div key={i} style={{background:'var(--navy2)',borderRadius:8,padding:'10px 12px'}}>
                <div style={{fontSize:'0.68rem',color:'var(--text2)',marginBottom:5,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{subj.name}</div>
                <div style={{display:'flex',alignItems:'center',gap:8}}>
                  <input type="number" min="0" max="100" value={subj.score}
                    onChange={e=>{const v=e.target.value;setExamForm(p=>({...p,subjects:p.subjects.map((s,j)=>j===i?{...s,score:v}:s)}));}}
                    style={{width:64,textAlign:'center',fontSize:'1rem',fontWeight:700}} placeholder="—" inputMode="numeric"/>
                  {perf && <span style={{fontSize:'0.8rem',fontWeight:800,color:perf.color||'var(--gold)'}}>
                    {useMarks(selectedStudent.grade)?perf.grade:perf.code}
                  </span>}
                </div>
              </div>
            );
          })}
        </div>
        <div style={{display:'flex',gap:8}}>
          <button className="btn btn-gold" style={{flex:1,justifyContent:'center'}} onClick={saveExam}>💾 Save Exam Results</button>
          <button className="btn btn-outline" onClick={()=>setView('list')}>Cancel</button>
        </div>
      </div>
    </div>
  );

  // ── Student results view ──────────────────────────────────────
  const studentExams = exams.filter(e=>e.studentId===selectedStudent.id)
    .sort((a,b)=>{const ay=parseInt(a.year),by2=parseInt(b.year);if(ay!==by2)return by2-ay;const t={'Term 1':1,'Term 2':2,'Term 3':3};return (t[b.term]||0)-(t[a.term]||0);});

  if(view === 'results') return (
    <div>
      <button className="btn btn-outline btn-sm" style={{marginBottom:14}} onClick={()=>{setSelectedStudent(null);setView('list');}}>← All Students</button>

      {/* Student header */}
      <div style={{background:'var(--navy3)',borderRadius:10,padding:'14px 16px',marginBottom:14,display:'flex',alignItems:'center',gap:12,border:'1px solid var(--border)'}}>
        <div style={{width:48,height:48,borderRadius:'50%',background:'linear-gradient(135deg,var(--gold),var(--gold2))',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'1.5rem',flexShrink:0}}>
          {selectedStudent.gender==='Female'?'👧':'👦'}
        </div>
        <div style={{flex:1}}>
          <div style={{fontWeight:700,fontSize:'1rem'}}>{selectedStudent.name}</div>
          <div style={{marginTop:4,display:'flex',gap:6,flexWrap:'wrap'}}>
            <span className={`badge badge-${LEVEL_COLOR[GRADE_LEVEL[selectedStudent.grade]]||'teal'}`}>{selectedStudent.grade}</span>
            <span className="badge badge-text2">{GRADE_LEVEL[selectedStudent.grade]}</span>
          </div>
        </div>
        <div style={{display:'flex',flexDirection:'column',gap:6}}>
          {!isReadOnly&&<button className="btn btn-gold btn-sm" onClick={()=>startRecord(selectedStudent)}>+ New Exam</button>}
          <button className="btn btn-teal btn-sm" onClick={()=>setView('perf')}>📊 Performance</button>
        </div>
      </div>

      {studentExams.length===0 ? (
        <div className="empty">
          <div className="empty-icon">📝</div>
          <div>No exam records for {selectedStudent.name} yet.</div>
          {!isReadOnly&&<button className="btn btn-gold" style={{marginTop:12}} onClick={()=>startRecord(selectedStudent)}>+ Record First Exam</button>}
        </div>
      ) : studentExams.map(exam=>{
        const scored = exam.subjects.filter(s=>s.score!==null);
        const avg = scored.length ? Math.round(scored.reduce((a,s)=>a+s.score,0)/scored.length) : null;
        const overall = avg!==null ? getCBCLevel(exam.grade, avg) : null;
        const mMode = useMarks(exam.grade);
        return(
          <div key={exam.id} style={{background:'var(--navy3)',borderRadius:10,padding:'14px',marginBottom:12,border:'1px solid var(--border)'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
              <div style={{display:'flex',gap:6,flexWrap:'wrap',alignItems:'center'}}>
                <span style={{fontWeight:700,fontSize:'0.9rem'}}>{exam.examType}</span>
                <span className="badge badge-teal" style={{fontSize:'0.7rem'}}>{exam.term} {exam.year}</span>
              </div>
              <div style={{display:'flex',alignItems:'center',gap:8}}>
                {overall&&<span style={{fontWeight:800,color:overall.color||'var(--gold)'}}>
                  {mMode?`${avg}% · ${overall.grade}`:overall.code} <span style={{fontWeight:400,fontSize:'0.72rem',color:'var(--text2)'}}>{overall.label}</span>
                </span>}
                {!isReadOnly&&<button className="btn btn-rose btn-sm" onClick={()=>delExam(exam.id)}>🗑</button>}
              </div>
            </div>
            <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(130px,1fr))',gap:6}}>
              {exam.subjects.filter(s=>s.score!==null).map((s,i)=>{
                const perf=getCBCLevel(exam.grade,s.score);
                return(
                  <div key={i} style={{background:'var(--navy2)',borderRadius:6,padding:'7px 10px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                    <span style={{fontSize:'0.7rem',color:'var(--text2)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',flex:1,marginRight:6}}>{s.name.split(' ')[0]}</span>
                    <span style={{fontWeight:700,fontSize:'0.8rem',color:perf.color||'var(--text)',flexShrink:0}}>
                      {mMode?`${s.score} (${perf.grade})`:perf.code}
                    </span>
                  </div>
                );
              })}
            </div>
          </div>
        );
      })}
    </div>
  );

  // ── Performance view ──────────────────────────────────────────
  if(view === 'perf'){
    const mMode=useMarks(selectedStudent.grade);
    const pc=(score,grade)=>getCBCLevel(grade||selectedStudent.grade,score).color||'var(--gold)';
    const pl=(score,grade)=>{const p=getCBCLevel(grade||selectedStudent.grade,score);return mMode?p.grade:p.code;};
    const sortedExams=exams.filter(e=>e.studentId===selectedStudent.id)
      .sort((a,b)=>{const ay=parseInt(a.year),by2=parseInt(b.year);if(ay!==by2)return ay-by2;const t={'Term 1':1,'Term 2':2,'Term 3':3};return(t[a.term]||0)-(t[b.term]||0);});
    const examAverages=sortedExams.map(e=>{
      const scored=e.subjects.filter(s=>s.score!==null);
      const avg=scored.length?Math.round(scored.reduce((a,s)=>a+s.score,0)/scored.length):null;
      return{...e,avg,label:`T${e.term.replace('Term ','')}'${e.year.slice(2)}`};
    });
    const subjectMap={};
    sortedExams.forEach(e=>e.subjects.forEach(s=>{if(s.score===null)return;if(!subjectMap[s.name])subjectMap[s.name]=[];subjectMap[s.name].push(s.score);}));
    const subjectStats=Object.entries(subjectMap).map(([name,scores])=>({name,avg:Math.round(scores.reduce((a,b)=>a+b,0)/scores.length)})).sort((a,b)=>b.avg-a.avg);
    const allScores=sortedExams.flatMap(e=>e.subjects.filter(s=>s.score!==null).map(s=>s.score));
    const overallAvg=allScores.length?Math.round(allScores.reduce((a,b)=>a+b,0)/allScores.length):null;
    const overallPerf=overallAvg!==null?getCBCLevel(selectedStudent.grade,overallAvg):null;
    const avgs=examAverages.filter(e=>e.avg!==null).map(e=>e.avg);
    const trend=avgs.length>=2?avgs[avgs.length-1]-avgs[0]:null;

    return(
      <div>
        <button className="btn btn-outline btn-sm" style={{marginBottom:14}} onClick={()=>setView('results')}>← Results</button>
        <div style={{fontWeight:700,fontSize:'1rem',marginBottom:12,display:'flex',alignItems:'center',gap:8}}>
          📊 {selectedStudent.name} — Performance
        </div>

        {sortedExams.length===0?(
          <div className="empty"><div className="empty-icon">📊</div>No exam records yet. Record exams first.</div>
        ):(
          <>
            {/* Summary */}
            <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:10,marginBottom:14}}>
              {[
                {label:'Overall Avg',value:overallAvg!==null?`${overallAvg}%`:'—',sub:overallPerf?(mMode?`Grade ${overallPerf.grade}`:overallPerf.code):'',color:overallPerf?.color||'var(--gold)'},
                {label:'Exams',value:sortedExams.length,sub:`${new Set(sortedExams.map(e=>e.year)).size} yr(s)`,color:'var(--teal)'},
                {label:'Trend',value:trend===null?'—':trend>0?`▲ +${trend}%`:trend===0?'→':` ▼ ${trend}%`,sub:trend===null?'2+ exams needed':trend>0?'Improving 🎉':'Needs attention',color:trend===null?'var(--text2)':trend>=0?'var(--green)':'var(--rose)'},
              ].map((s,i)=>(
                <div key={i} style={{background:'var(--navy3)',borderRadius:9,padding:'12px 8px',textAlign:'center'}}>
                  <div style={{fontSize:'0.6rem',textTransform:'uppercase',letterSpacing:'1px',color:'var(--text2)',fontWeight:700,marginBottom:5}}>{s.label}</div>
                  <div style={{fontSize:'1.15rem',fontWeight:800,color:s.color}}>{s.value}</div>
                  <div style={{fontSize:'0.62rem',color:'var(--text2)',marginTop:3}}>{s.sub}</div>
                </div>
              ))}
            </div>

            {/* Avg per exam bars */}
            <div style={{background:'var(--navy3)',borderRadius:10,padding:'14px',marginBottom:12}}>
              <div style={{fontSize:'0.65rem',textTransform:'uppercase',letterSpacing:'1px',fontWeight:700,color:'var(--text2)',marginBottom:10}}>📈 Average per Exam</div>
              {examAverages.map((e,i)=>e.avg!==null&&(
                <div key={i} style={{display:'flex',alignItems:'center',gap:8,marginBottom:7}}>
                  <div style={{width:80,fontSize:'0.65rem',color:'var(--text2)',textAlign:'right',flexShrink:0}}>{e.label}</div>
                  <div style={{flex:1,height:20,background:'var(--navy2)',borderRadius:4,overflow:'hidden',position:'relative'}}>
                    <div style={{height:'100%',width:`${e.avg}%`,background:pc(e.avg,e.grade),borderRadius:4,opacity:0.85}}/>
                    <span style={{position:'absolute',right:5,top:'50%',transform:'translateY(-50%)',fontSize:'0.65rem',fontWeight:700,color:'#fff',textShadow:'0 1px 3px rgba(0,0,0,0.8)'}}>{e.avg}%</span>
                  </div>
                  <div style={{width:24,fontSize:'0.7rem',fontWeight:800,color:pc(e.avg,e.grade),flexShrink:0}}>{pl(e.avg,e.grade)}</div>
                </div>
              ))}
            </div>

            {/* Subject averages */}
            <div style={{background:'var(--navy3)',borderRadius:10,padding:'14px',marginBottom:12}}>
              <div style={{fontSize:'0.65rem',textTransform:'uppercase',letterSpacing:'1px',fontWeight:700,color:'var(--text2)',marginBottom:10}}>📚 Subject Averages</div>
              {subjectStats.map((s,i)=>(
                <div key={i} style={{display:'flex',alignItems:'center',gap:8,marginBottom:6}}>
                  <div style={{width:100,fontSize:'0.63rem',color:'var(--text2)',textAlign:'right',flexShrink:0,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{s.name.split(' ')[0]}</div>
                  <div style={{flex:1,height:16,background:'var(--navy2)',borderRadius:3,overflow:'hidden'}}>
                    <div style={{height:'100%',width:`${s.avg}%`,background:pc(s.avg),opacity:0.85}}/>
                  </div>
                  <div style={{width:50,fontSize:'0.68rem',fontWeight:700,color:pc(s.avg),flexShrink:0}}>{s.avg}% {pl(s.avg)}</div>
                </div>
              ))}
            </div>

            {/* Strengths/Weaknesses */}
            {subjectStats.length>=2&&(
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
                <div style={{background:'rgba(34,197,94,0.07)',border:'1px solid rgba(34,197,94,0.2)',borderRadius:9,padding:'12px'}}>
                  <div style={{fontSize:'0.65rem',fontWeight:700,textTransform:'uppercase',color:'var(--green)',marginBottom:8}}>💪 Top Subjects</div>
                  {subjectStats.slice(0,3).map((s,i)=>(
                    <div key={i} style={{display:'flex',justifyContent:'space-between',marginBottom:5,fontSize:'0.72rem'}}>
                      <span style={{color:'var(--text)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',flex:1,marginRight:4}}>{s.name.split(' ')[0]}</span>
                      <span style={{fontWeight:700,color:pc(s.avg),flexShrink:0}}>{s.avg}%</span>
                    </div>
                  ))}
                </div>
                <div style={{background:'rgba(239,68,68,0.07)',border:'1px solid rgba(239,68,68,0.2)',borderRadius:9,padding:'12px'}}>
                  <div style={{fontSize:'0.65rem',fontWeight:700,textTransform:'uppercase',color:'var(--rose)',marginBottom:8}}>📌 Needs Work</div>
                  {[...subjectStats].slice(-3).reverse().map((s,i)=>(
                    <div key={i} style={{display:'flex',justifyContent:'space-between',marginBottom:5,fontSize:'0.72rem'}}>
                      <span style={{color:'var(--text)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',flex:1,marginRight:4}}>{s.name.split(' ')[0]}</span>
                      <span style={{fontWeight:700,color:pc(s.avg),flexShrink:0}}>{s.avg}%</span>
                    </div>
                  ))}
                </div>
              </div>
            )}
          </>
        )}
      </div>
    );
  }
  return null;
}

function StudentForm({initial, onSave, onCancel, title, routes=[]}){
  const [form,setForm]=useState({...BLANK_STUDENT,...initial});
  const isTransport = form.transportMode==='One-Way'||form.transportMode==='Two-Way';
  const set = (k,v)=>setForm(p=>({...p,[k]:v}));

  return(
    <div className="card" style={{marginBottom:20,border:'1px solid rgba(240,165,0,0.3)'}}>
      <div className="section-header">
        <h2 style={{color:'var(--gold)'}}>{title}</h2>
        <button className="close-btn" onClick={onCancel}>×</button>
      </div>

      {/* Personal Info */}
      <div style={{fontSize:'0.7rem',textTransform:'uppercase',letterSpacing:'1.5px',color:'var(--text2)',fontWeight:600,marginBottom:10}}>👤 Personal Information</div>
      <div className="form-grid" style={{marginBottom:18}}>
        <div className="form-group"><label>Full Name *</label><input value={form.name} onChange={e=>set('name',e.target.value)} placeholder="Student full name"/></div>
        <div className="form-group"><label>Grade</label>
          <select value={form.grade} onChange={e=>set('grade',e.target.value)}>{GRADES.map(g=><option key={g}>{g}</option>)}</select>
        </div>
        <div className="form-group"><label>Date of Birth</label><input type="date" value={form.dob} onChange={e=>set('dob',e.target.value)}/></div>
        <div className="form-group"><label>Gender</label>
          <select value={form.gender} onChange={e=>set('gender',e.target.value)}><option>Male</option><option>Female</option></select>
        </div>
        <div className="form-group"><label>Enrolled Date</label><input type="date" value={form.enrolled} onChange={e=>set('enrolled',e.target.value)}/></div>
      </div>

      {/* Parent Info */}
      <div style={{fontSize:'0.7rem',textTransform:'uppercase',letterSpacing:'1.5px',color:'var(--text2)',fontWeight:600,marginBottom:10}}>👨‍👩‍👧 Parent / Guardian</div>
      <div className="form-grid" style={{marginBottom:18}}>
        <div className="form-group"><label>Parent/Guardian Name *</label><input value={form.parent} onChange={e=>set('parent',e.target.value)}/></div>
        <div className="form-group"><label>Phone Number</label><input value={form.phone} onChange={e=>set('phone',e.target.value)} placeholder="07XXXXXXXX"/></div>
      </div>

      {/* Transport */}
      <div style={{fontSize:'0.7rem',textTransform:'uppercase',letterSpacing:'1.5px',color:'var(--text2)',fontWeight:600,marginBottom:10}}>🚌 Transport</div>
      <div className="form-grid" style={{marginBottom:18}}>
        <div className="form-group">
          <label>Transport Mode</label>
          <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
            {TRANSPORT_MODES.map(m=>(
              <button key={m} type="button"
                className={`btn btn-sm ${form.transportMode===m?m==='Walking'?'btn-teal':m==='One-Way'?'btn-gold':'btn-green':'btn-outline'}`}
                onClick={()=>set('transportMode',m)}
                style={{flex:1,justifyContent:'center',minWidth:80}}
              >
                {m==='Walking'?'🚶':m==='One-Way'?'➡️':'↔️'} {m}
              </button>
            ))}
          </div>
        </div>
        {isTransport&&(
          <div className="form-group">
            <label>Route</label>
            <select value={form.route} onChange={e=>set('route',e.target.value)}>
              <option value="">Select Route</option>
              {routes.length>0
                ? routes.map(r=><option key={r.id} value={r.name}>{r.name}{r.description?` — ${r.description}`:''}</option>)
                : <><option>Route A</option><option>Route B</option><option>Route C</option><option>Route D</option></>
              }
            </select>
            {form.route&&routes.length>0&&(()=>{
              const r=routes.find(r=>r.name===form.route);
              return r?(
                <div style={{marginTop:6,padding:'6px 10px',background:'var(--navy3)',borderRadius:6,fontSize:'0.72rem',color:'var(--text2)'}}>
                  🌅 {r.morningTime} · 🌆 {r.eveningTime}
                  {r.stops&&<div style={{marginTop:3}}>Stops: {r.stops}</div>}
                </div>
              ):null;
            })()}
          </div>
        )}
      </div>

      {/* Feeding Program */}
      <div style={{fontSize:'0.7rem',textTransform:'uppercase',letterSpacing:'1.5px',color:'var(--text2)',fontWeight:600,marginBottom:10}}>🍽️ Feeding Program</div>
      <div style={{display:'flex',gap:8,flexWrap:'wrap',marginBottom:20}}>
        {FEEDING_PROGRAMS.map(f=>(
          <button key={f} type="button"
            className={`btn btn-sm ${form.feeding===f?'btn-gold':'btn-outline'}`}
            onClick={()=>set('feeding',f)}
            style={{flex:'none'}}
          >
            {f==='None'?'❌':f==='Tea'?'☕':f==='Snack'?'🍪':f==='Lunch'?'🍽️':f==='Tea + Lunch'?'☕🍽️':'🍪🍽️'} {f}
          </button>
        ))}
      </div>

      <div className="flex gap-8">
        <button className="btn btn-gold" onClick={()=>onSave(form)}>💾 {title.startsWith('Edit')?'Update Student':'Save Student'}</button>
        <button className="btn btn-outline" onClick={onCancel}>Cancel</button>
      </div>
    </div>
  );
}

function Students({students,setStudents,showToast,routes=[],exams=[],setExams,session}){
  const [search,setSearch]=useState('');
  const [levelFilter,setLevelFilter]=useState('');
  const [gradeFilter,setGradeFilter]=useState('');
  const [transportFilter,setTransportFilter]=useState('');
  const [feedingFilter,setFeedingFilter]=useState('');
  const [showForm,setShowForm]=useState(false);
  const [editId,setEditId]=useState(null);
  const [viewId,setViewId]=useState(null);
  const [profileTab,setProfileTab]=useState('info');
  const [showExamForm,setShowExamForm]=useState(false);
  const [examForm,setExamForm]=useState(null);
  const [showImport,setShowImport]=useState(false);
  const [importRows,setImportRows]=useState([]);
  const [importErrors,setImportErrors]=useState([]);
  const [importLoading,setImportLoading]=useState(false);

  const openProfile=(id)=>{setViewId(id);setProfileTab('info');setShowExamForm(false);};

  const startNewExam=(student)=>{
    const subjs=KICD_SUBJECTS[student.grade]||[];
    setExamForm({
      year:new Date().getFullYear().toString(),
      term:'Term 1',examType:'End Term',
      grade:student.grade,
      subjects:subjs.map(n=>({name:n,score:''})),
    });
    setShowExamForm(true);
  };

  const saveExam=(studentId)=>{
    if(!examForm)return;
    const filled=examForm.subjects.filter(s=>s.score!=='');
    if(filled.length===0){showToast('Enter at least one score','rose');return;}
    const rec={
      id:'E'+uid(),studentId,
      year:examForm.year,term:examForm.term,examType:examForm.examType,
      grade:examForm.grade,
      subjects:examForm.subjects.map(s=>({name:s.name,score:s.score===''?null:Number(s.score)})),
    };
    setExams(p=>[...p,rec]);
    setShowExamForm(false);setExamForm(null);
    showToast('Exam results saved!');
  };

  const delExam=(id)=>{
    if(!confirm('Delete this exam record?'))return;
    setExams(p=>p.filter(e=>e.id!==id));
    showToast('Exam record deleted','rose');
  };

  // ── Bulk Import helpers ─────────────────────────────────────────────
  const IMPORT_COLS = ['name','gender','dob','grade','parent','phone','enrolled','feeding','transportMode'];

  const normalizeGrade = (raw='') => {
    const v = raw.toString().trim();
    // exact match
    if(GRADES.includes(v)) return v;
    // common aliases
    const map = {
      'pp1':'Pre-Primary 1','pp2':'Pre-Primary 2','pg':'Play Group','playgroup':'Play Group',
      'g1':'Grade 1','g2':'Grade 2','g3':'Grade 3','g4':'Grade 4','g5':'Grade 5',
      'g6':'Grade 6','g7':'Grade 7','g8':'Grade 8','g9':'Grade 9',
      'grade1':'Grade 1','grade2':'Grade 2','grade3':'Grade 3','grade4':'Grade 4',
      'grade5':'Grade 5','grade6':'Grade 6','grade7':'Grade 7','grade8':'Grade 8','grade9':'Grade 9',
    };
    return map[v.toLowerCase().replace(/\s+/,'')] || v;
  };

  const normalizeGender=(v='')=>{ const s=v.toString().trim().toLowerCase(); return s.startsWith('f')?'Female':s.startsWith('m')?'Male':'Male'; };
  const normalizeFeeding=(v='')=>{ const s=v.toString().trim(); return FEEDING_PROGRAMS.includes(s)?s:'None'; };
  const normalizeTransport=(v='')=>{ const s=v.toString().trim(); return TRANSPORT_MODES.includes(s)?s:'Walking'; };
  const normalizeDate=(v='')=>{
    if(!v) return '';
    const s=v.toString().trim();
    // Excel serial number
    if(/^\d{4,5}$/.test(s)){
      const d=new Date(Date.UTC(1900,0,1)+(parseInt(s)-2)*86400000);
      return d.toISOString().split('T')[0];
    }
    // already ISO
    if(/^\d{4}-\d{2}-\d{2}/.test(s)) return s.slice(0,10);
    // dd/mm/yyyy or mm/dd/yyyy
    const parts=s.split(/[\/-]/);
    if(parts.length===3){
      const [a,b,c]=parts;
      if(parseInt(c)>31) return `${c}-${b.padStart(2,'0')}-${a.padStart(2,'0')}`;
      return `${a}-${b.padStart(2,'0')}-${c.padStart(2,'0')}`;
    }
    return s;
  };

  const parseRows=(rawRows)=>{
    const rows=[]; const errs=[];
    rawRows.forEach((r,i)=>{
      const name=(r.name||r.Name||r['Student Name']||r['Full Name']||'').toString().trim();
      const grade=normalizeGrade(r.grade||r.Grade||r['Grade/Class']||r.Class||'');
      const parent=(r.parent||r.Parent||r['Parent Name']||r['Guardian']||'').toString().trim();
      if(!name){ errs.push(`Row ${i+2}: missing Name`); return; }
      if(!GRADES.includes(grade)){ errs.push(`Row ${i+2}: unrecognised grade "${r.grade||r.Grade||r['Grade/Class']||''}"`); }
      rows.push({
        _rowNum:i+2, _ok:GRADES.includes(grade)&&!!name,
        id:'S'+uid(), alumni:false, prevGrade:null,
        name, grade,
        gender:normalizeGender(r.gender||r.Gender||r.Sex||'Male'),
        dob:normalizeDate(r.dob||r.DOB||r['Date of Birth']||''),
        parent:parent||'(Unknown)',
        phone:(r.phone||r.Phone||r['Phone No']||r.Contact||'').toString().trim(),
        enrolled:normalizeDate(r.enrolled||r.Enrolled||r['Date Enrolled']||new Date().toISOString().split('T')[0]),
        feeding:normalizeFeeding(r.feeding||r.Feeding||r['Feeding Program']||''),
        transportMode:normalizeTransport(r.transportMode||r.Transport||r['Transport Mode']||'Walking'),
      });
    });
    return{rows,errs};
  };

  const handleImportFile=(e)=>{
    const file=e.target.files?.[0]; if(!file) return;
    setImportLoading(true); setImportErrors([]); setImportRows([]);
    const ext=file.name.split('.').pop().toLowerCase();

    if(ext==='xlsx'||ext==='xls'||ext==='csv'){
      // Use SheetJS (loaded from CDN)
      const reader=new FileReader();
      reader.onload=(ev)=>{
        try{
          const XLSX=window.XLSX;
          if(!XLSX){ showToast('SheetJS not loaded yet — try again in a moment','rose'); setImportLoading(false); return; }
          const wb=XLSX.read(ev.target.result,{type:'array'});
          const ws=wb.Sheets[wb.SheetNames[0]];
          const data=XLSX.utils.sheet_to_json(ws,{defval:''});
          const{rows,errs}=parseRows(data);
          setImportRows(rows); setImportErrors(errs); setImportLoading(false);
        }catch(err){ showToast('Could not read file: '+err.message,'rose'); setImportLoading(false); }
      };
      reader.readAsArrayBuffer(file);
    } else if(ext==='pdf'){
      // Use PDF.js (loaded from CDN) — extract text and parse table
      const reader=new FileReader();
      reader.onload=async(ev)=>{
        try{
          const pdfjsLib=window['pdfjs-dist/build/pdf'];
          if(!pdfjsLib){ showToast('PDF.js not loaded yet — try again','rose'); setImportLoading(false); return; }
          pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
          const pdf=await pdfjsLib.getDocument({data:ev.target.result}).promise;
          let allText='';
          for(let i=1;i<=pdf.numPages;i++){
            const page=await pdf.getPage(i);
            const tc=await page.getTextContent();
            allText+=tc.items.map(x=>x.str).join(' ')+'\n';
          }
          // Parse text: try to find rows by common delimiters
          const lines=allText.split('\n').map(l=>l.trim()).filter(l=>l.length>3);
          // Heuristic: look for header row containing "name"
          const headerIdx=lines.findIndex(l=>l.toLowerCase().includes('name'));
          if(headerIdx===-1){ showToast('Could not detect a student table in this PDF. Please use Excel format for best results.','rose'); setImportLoading(false); return; }
          const headers=lines[headerIdx].split(/\s{2,}|\t/).map(h=>h.trim().toLowerCase());
          const rawRows=[];
          for(let i=headerIdx+1;i<lines.length;i++){
            const cells=lines[i].split(/\s{2,}|\t/).map(c=>c.trim());
            if(cells.length<2) continue;
            const row={};
            headers.forEach((h,j)=>{ row[h]=cells[j]||''; });
            if(row.name||row['student name']) rawRows.push(row);
          }
          if(rawRows.length===0){ showToast('No student rows found in PDF. Use Excel format for best results.','rose'); setImportLoading(false); return; }
          const{rows,errs}=parseRows(rawRows);
          setImportRows(rows); setImportErrors(errs); setImportLoading(false);
        }catch(err){ showToast('PDF parse error: '+err.message,'rose'); setImportLoading(false); }
      };
      reader.readAsArrayBuffer(file);
    } else {
      showToast('Unsupported format. Use .xlsx, .xls, .csv or .pdf','rose');
      setImportLoading(false);
    }
    e.target.value='';
  };

  const confirmImport=()=>{
    const valid=importRows.filter(r=>r._ok);
    if(valid.length===0){ showToast('No valid rows to import','rose'); return; }
    const clean=valid.map(({_rowNum,_ok,...rest})=>rest);
    setStudents(p=>[...p,...clean]);
    showToast(`✅ ${valid.length} student${valid.length>1?'s':''} imported!`);
    setImportRows([]); setImportErrors([]); setShowImport(false);
  };

  const downloadTemplate=()=>{
    const XLSX=window.XLSX;
    if(!XLSX){ showToast('SheetJS not ready yet — try again','rose'); return; }
    const template=[{
      'Student Name':'John Kamau','Gender':'Male','Date of Birth':'2015-03-14',
      'Grade/Class':'Grade 4','Parent Name':'Jane Kamau','Phone No':'0712345678',
      'Date Enrolled':'2024-01-15','Feeding Program':'Lunch','Transport Mode':'Walking',
    },{
      'Student Name':'Amina Wanjiru','Gender':'Female','Date of Birth':'2016-07-22',
      'Grade/Class':'Grade 3','Parent Name':'Hassan Wanjiru','Phone No':'0798765432',
      'Date Enrolled':'2024-01-15','Feeding Program':'None','Transport Mode':'One-Way',
    }];
    const ws=XLSX.utils.json_to_sheet(template);
    const wb=XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb,ws,'Students');
    XLSX.writeFile(wb,'TVSA-Student-Import-Template.xlsx');
  };

  const filtered = students.filter(s=>{
    const q=search.toLowerCase();
    const matchQ=s.name.toLowerCase().includes(q)||s.id.toLowerCase().includes(q)||s.parent.toLowerCase().includes(q);
    const matchL=!levelFilter||GRADE_LEVEL[s.grade]===levelFilter;
    const matchG=!gradeFilter||s.grade===gradeFilter;
    const matchT=!transportFilter||s.transportMode===transportFilter;
    const matchF=!feedingFilter||s.feeding===feedingFilter;
    return matchQ&&matchL&&matchG&&matchT&&matchF;
  });

  const saveNew=(form)=>{
    if(!form.name||!form.parent){showToast('Name and parent are required','rose');return;}
    setStudents(p=>[...p,{...form,id:'S'+uid(),alumni:false,prevGrade:null,transport:form.transportMode!=='Walking'}]);
    setShowForm(false);showToast('Student registered!');
  };

  const saveEdit=(form)=>{
    if(!form.name||!form.parent){showToast('Name and parent are required','rose');return;}
    setStudents(p=>p.map(s=>s.id===editId?{...s,...form,transport:form.transportMode!=='Walking'}:s));
    setEditId(null);showToast('Student updated!');
  };

  const del=(id)=>{
    if(!confirm('Permanently remove this student?'))return;
    setStudents(p=>p.filter(s=>s.id!==id));
    setViewId(null);showToast('Student removed','rose');
  };

  const editStudent=students.find(s=>s.id===editId);
  const viewStudent=students.find(s=>s.id===viewId);

  const transportIcon=(m)=>m==='Walking'?'🚶':m==='One-Way'?'➡️':'↔️';
  const feedingIcon=(f)=>f==='None'?'—':f==='Tea'?'☕':f==='Snack'?'🍪':f==='Lunch'?'🍽️':f==='Tea + Lunch'?'☕🍽️':'🍪🍽️';

  // Summary stats
  const byFeeding = FEEDING_PROGRAMS.map(f=>({f,n:students.filter(s=>s.feeding===f).length})).filter(x=>x.n>0);
  const byTransport = TRANSPORT_MODES.map(m=>({m,n:students.filter(s=>s.transportMode===m).length}));

  return(
    <div>
      {/* Header */}
      <div className="section-header">
        <h2>Students ({filtered.length}/{students.length})</h2>
        <div className="flex gap-8" style={{flexWrap:'wrap'}}>
          <input placeholder="Search name, ID, parent..." value={search} onChange={e=>setSearch(e.target.value)} style={{width:200}}/>
          <select value={levelFilter} onChange={e=>{setLevelFilter(e.target.value);setGradeFilter('');}}>
            <option value="">All Levels</option>
            <option value="Early Childhood">🧒 Early Childhood</option>
            <option value="Primary">📚 Primary</option>
            <option value="Junior Secondary">🎓 Junior Secondary</option>
          </select>
          <select value={gradeFilter} onChange={e=>setGradeFilter(e.target.value)}>
            <option value="">All Grades</option>
            {(levelFilter?GRADES.filter(g=>GRADE_LEVEL[g]===levelFilter):GRADES).map(g=><option key={g}>{g}</option>)}
          </select>
          <select value={transportFilter} onChange={e=>setTransportFilter(e.target.value)}>
            <option value="">All Transport</option>
            {TRANSPORT_MODES.map(m=><option key={m}>{m}</option>)}
          </select>
          <select value={feedingFilter} onChange={e=>setFeedingFilter(e.target.value)}>
            <option value="">All Feeding</option>
            {FEEDING_PROGRAMS.map(f=><option key={f}>{f}</option>)}
          </select>
          <button className="btn btn-teal" onClick={()=>setShowImport(true)}>⬆️ Import</button>
          <button className="btn btn-gold" onClick={()=>{setShowForm(true);setEditId(null);}}>+ Add Student</button>
        </div>
      </div>

      {/* Summary cards */}
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16,marginBottom:20}}>
        <div className="card" style={{padding:'14px 18px'}}>
          <div style={{fontSize:'0.7rem',textTransform:'uppercase',letterSpacing:'1.5px',color:'var(--text2)',fontWeight:600,marginBottom:10}}>🍽️ Feeding Program Breakdown</div>
          <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
            {byFeeding.map(x=>(
              <div key={x.f} style={{background:'var(--navy3)',borderRadius:7,padding:'6px 12px',fontSize:'0.78rem'}}>
                <span>{feedingIcon(x.f)}</span> <span className="fw6">{x.f}</span> <span className={`badge badge-${FEEDING_COLORS[x.f]}`} style={{marginLeft:4}}>{x.n}</span>
              </div>
            ))}
          </div>
        </div>
        <div className="card" style={{padding:'14px 18px'}}>
          <div style={{fontSize:'0.7rem',textTransform:'uppercase',letterSpacing:'1.5px',color:'var(--text2)',fontWeight:600,marginBottom:10}}>🚌 Transport Breakdown</div>
          <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
            {byTransport.map(x=>(
              <div key={x.m} style={{background:'var(--navy3)',borderRadius:7,padding:'6px 12px',fontSize:'0.78rem'}}>
                <span>{transportIcon(x.m)}</span> <span className="fw6">{x.m}</span> <span className="badge badge-teal" style={{marginLeft:4}}>{x.n}</span>
              </div>
            ))}
          </div>
        </div>
      </div>

      {/* Add Form */}
      {showForm&&!editId&&(
        <StudentForm title="Register New Student" initial={BLANK_STUDENT} onSave={saveNew} onCancel={()=>setShowForm(false)} routes={routes}/>
      )}

      {/* Edit Form */}
      {editId&&editStudent&&(
        <StudentForm title={`Edit — ${editStudent.name}`} initial={editStudent} onSave={saveEdit} onCancel={()=>setEditId(null)} routes={routes}/>
      )}

      {/* Desktop table */}
      <div className="card desktop-only">
        <div className="table-wrap">
          <table>
            <thead>
              <tr>
                <th>ID</th><th>Name</th><th>Grade</th><th>Gender</th><th>Parent</th>
                <th>Transport</th><th>Feeding</th><th>Enrolled</th><th>Actions</th>
              </tr>
            </thead>
            <tbody>
              {filtered.length===0
                ? <tr><td colSpan={9}><div className="empty"><div className="empty-icon">👨‍🎓</div>No students match filters</div></td></tr>
                : filtered.map(s=>(
                  <tr key={s.id} style={{cursor:'pointer'}} onClick={()=>openProfile(s.id)}>
                    <td className="mono fs-sm fc-text2">{s.id}</td>
                    <td className="fw6">{s.name}</td>
                    <td>
                      <span className={`badge badge-${LEVEL_COLOR[GRADE_LEVEL[s.grade]]||'teal'}`}>{s.grade}</span>
                      <div style={{fontSize:'0.62rem',color:'var(--text2)',marginTop:2}}>{LEVEL_ICON[GRADE_LEVEL[s.grade]]} {GRADE_LEVEL[s.grade]}</div>
                    </td>

                      const overall=avg!==null?getCBCLevel(exam.grade,avg):null;
                      return(
                        <div key={exam.id} style={{background:'var(--navy3)',borderRadius:10,padding:'14px',marginBottom:12}}>
                          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
                            <div>
                              <span style={{fontWeight:700,fontSize:'0.92rem'}}>{exam.examType}</span>
                              <span className="badge badge-teal" style={{marginLeft:8,fontSize:'0.72rem'}}>{exam.term} {exam.year}</span>
                              <span className="badge badge-text2" style={{marginLeft:6,fontSize:'0.68rem'}}>{exam.grade}</span>
                            </div>
                            <div style={{display:'flex',alignItems:'center',gap:8}}>

                            }
                          </div>
                        </div>
                      );
                    })}
                  </div>
                );
              })()}

                const examAverages=studentExams.map(e=>{
                  const scored=e.subjects.filter(s=>s.score!==null);
                  const avg=scored.length?Math.round(scored.reduce((a,s)=>a+s.score,0)/scored.length):null;
                  return{...e,avg,label:`T${e.term.replace('Term ','')}'${e.year.slice(2)} ${e.examType.split('/')[0].trim().slice(0,3)}`};
                });

                const subjectMap={};
                studentExams.forEach(e=>e.subjects.forEach(s=>{
                  if(s.score===null)return;
                  if(!subjectMap[s.name])subjectMap[s.name]=[];
                  subjectMap[s.name].push({score:s.score,exam:e});
                }));
                const subjectStats=Object.entries(subjectMap).map(([name,arr])=>({
                  name,
                  avg:Math.round(arr.reduce((a,x)=>a+x.score,0)/arr.length),
                  min:Math.min(...arr.map(x=>x.score)),
                  max:Math.max(...arr.map(x=>x.score)),
                  count:arr.length,
                  scores:arr,
                })).sort((a,b)=>b.avg-a.avg);

                const allScores=studentExams.flatMap(e=>e.subjects.filter(s=>s.score!==null).map(s=>s.score));
                const overallAvg=allScores.length?Math.round(allScores.reduce((a,b)=>a+b,0)/allScores.length):null;
                const overallPerf=overallAvg!==null?getCBCLevel(viewStudent.grade,overallAvg):null;
                const avgs=examAverages.filter(e=>e.avg!==null).map(e=>e.avg);
                const trend=avgs.length>=2?avgs[avgs.length-1]-avgs[0]:null;

                return(
                  <div style={{paddingBottom:8}}>
                    {/* ── Summary cards ── */}
                    <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:10,marginBottom:14}}>
                      {[
                        {label:'Overall Average',value:overallAvg!==null?`${overallAvg}%`:'—',sub:overallPerf?(mMode?`Grade ${overallPerf.grade} — ${overallPerf.label}`:overallPerf.code+' — '+overallPerf.label):'',color:overallPerf?.color||'var(--gold)'},
                        {label:'Exams Recorded',value:studentExams.length,sub:`${new Set(studentExams.map(e=>e.year)).size} year(s) · ${new Set(studentExams.map(e=>e.term)).size} term(s)`,color:'var(--teal)'},
                        {label:'Trend',value:trend===null?'—':trend>0?`▲ +${trend}%`:trend===0?'→ Steady':`▼ ${trend}%`,sub:trend===null?'Need 2+ exams':trend>5?'Great progress 🎉':trend>0?'Improving':'Needs attention',color:trend===null?'var(--text2)':trend>=0?'var(--green)':'var(--rose)'},
                      ].map((s,i)=>(
                        <div key={i} style={{background:'var(--navy3)',borderRadius:9,padding:'12px 10px',textAlign:'center'}}>
                          <div style={{fontSize:'0.6rem',textTransform:'uppercase',letterSpacing:'1.2px',color:'var(--text2)',fontWeight:700,marginBottom:5}}>{s.label}</div>
                          <div style={{fontSize:'1.15rem',fontWeight:800,color:s.color,lineHeight:1.1}}>{s.value}</div>
                          <div style={{fontSize:'0.6rem',color:'var(--text2)',marginTop:4,lineHeight:1.4}}>{s.sub}</div>
                        </div>
                      ))}
                    </div>

                    {/* ── Average per exam (bar chart) ── */}
                    <div style={{background:'var(--navy3)',borderRadius:10,padding:'14px',marginBottom:12}}>
                      <div style={{fontSize:'0.68rem',textTransform:'uppercase',letterSpacing:'1px',fontWeight:700,color:'var(--text2)',marginBottom:10}}>📈 Average Score per Exam</div>
                      {examAverages.map((e,i)=>e.avg!==null&&(
                        <div key={i} style={{display:'flex',alignItems:'center',gap:8,marginBottom:7}}>
                          <div style={{width:108,fontSize:'0.64rem',color:'var(--text2)',textAlign:'right',flexShrink:0,lineHeight:1.3}}>{e.label}</div>
                          <div style={{flex:1,height:20,background:'var(--navy2)',borderRadius:4,overflow:'hidden',position:'relative'}}>
                            <div style={{height:'100%',width:`${e.avg}%`,background:pc(e.avg,e.grade),borderRadius:4,opacity:0.85,transition:'width 0.5s'}}/>
                            <span style={{position:'absolute',right:5,top:'50%',transform:'translateY(-50%)',fontSize:'0.65rem',fontWeight:700,color:'#fff',textShadow:'0 1px 3px rgba(0,0,0,0.8)'}}>
                              {e.avg}%
                            </span>
                          </div>
                          <div style={{width:26,fontSize:'0.7rem',fontWeight:800,color:pc(e.avg,e.grade),flexShrink:0}}>{pl(e.avg,e.grade)}</div>
                        </div>
                      ))}
                    </div>

                    {/* ── Subject averages ── */}
                    <div style={{background:'var(--navy3)',borderRadius:10,padding:'14px',marginBottom:12}}>
                      <div style={{fontSize:'0.68rem',textTransform:'uppercase',letterSpacing:'1px',fontWeight:700,color:'var(--text2)',marginBottom:10}}>📚 Subject Averages (All Exams)</div>
                      {subjectStats.map((s,i)=>(
                        <div key={i} style={{display:'flex',alignItems:'center',gap:8,marginBottom:6}}>
                          <div style={{width:108,fontSize:'0.64rem',color:'var(--text2)',textAlign:'right',flexShrink:0,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{s.name}</div>
                          <div style={{flex:1,height:16,background:'var(--navy2)',borderRadius:3,overflow:'hidden',position:'relative'}}>
                            <div style={{height:'100%',width:`${s.avg}%`,background:pc(s.avg),borderRadius:3,opacity:0.8}}/>
                          </div>
                          <div style={{width:40,fontSize:'0.68rem',fontWeight:700,color:pc(s.avg),flexShrink:0}}>{s.avg}% <span style={{fontWeight:800}}>{pl(s.avg)}</span></div>
                        </div>
                      ))}
                    </div>

                    {/* ── Strengths & Weaknesses ── */}
                    {subjectStats.length>=2&&(
                      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:12}}>
                        <div style={{background:'rgba(34,197,94,0.07)',border:'1px solid rgba(34,197,94,0.2)',borderRadius:9,padding:'12px 12px'}}>
                          <div style={{fontSize:'0.65rem',fontWeight:700,textTransform:'uppercase',letterSpacing:'1px',color:'var(--green)',marginBottom:8}}>💪 Top Subjects</div>
                          {subjectStats.slice(0,Math.min(3,subjectStats.length)).map((s,i)=>(
                            <div key={i} style={{display:'flex',justifyContent:'space-between',marginBottom:5,fontSize:'0.72rem',alignItems:'center'}}>
                              <span style={{color:'var(--text)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',flex:1,marginRight:4}}>{s.name.split(' & ')[0].split('/')[0]}</span>
                              <span style={{fontWeight:700,color:pc(s.avg),flexShrink:0}}>{s.avg}%</span>
                            </div>
                          ))}
                        </div>
                        <div style={{background:'rgba(239,68,68,0.07)',border:'1px solid rgba(239,68,68,0.2)',borderRadius:9,padding:'12px 12px'}}>
                          <div style={{fontSize:'0.65rem',fontWeight:700,textTransform:'uppercase',letterSpacing:'1px',color:'var(--rose)',marginBottom:8}}>📌 Needs Attention</div>
                          {[...subjectStats].slice(-Math.min(3,subjectStats.length)).reverse().map((s,i)=>(
                            <div key={i} style={{display:'flex',justifyContent:'space-between',marginBottom:5,fontSize:'0.72rem',alignItems:'center'}}>
                              <span style={{color:'var(--text)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',flex:1,marginRight:4}}>{s.name.split(' & ')[0].split('/')[0]}</span>
                              <span style={{fontWeight:700,color:pc(s.avg),flexShrink:0}}>{s.avg}%</span>
                            </div>
                          ))}
                        </div>
                      </div>
                    )}

                    {/* ── Full history table ── */}
                    <div style={{background:'var(--navy3)',borderRadius:10,padding:'14px'}}>
                      <div style={{fontSize:'0.68rem',textTransform:'uppercase',letterSpacing:'1px',fontWeight:700,color:'var(--text2)',marginBottom:10}}>📋 Full Results Table</div>
                      <div style={{overflowX:'auto',WebkitOverflowScrolling:'touch'}}>
                        <table style={{width:'100%',borderCollapse:'collapse',fontSize:'0.68rem',minWidth:subjectStats.length*60+160}}>
                          <thead>
                            <tr style={{borderBottom:'1px solid var(--border)'}}>
                              <th style={{textAlign:'left',padding:'5px 8px',color:'var(--text2)',fontWeight:600,fontSize:'0.6rem',textTransform:'uppercase',whiteSpace:'nowrap'}}>Exam</th>
                              {subjectStats.map(s=>(
                                <th key={s.name} style={{textAlign:'center',padding:'4px 5px',color:'var(--text2)',fontWeight:600,fontSize:'0.58rem',whiteSpace:'nowrap',maxWidth:54,overflow:'hidden',textOverflow:'ellipsis'}} title={s.name}>{s.name.split(' ')[0].slice(0,7)}</th>
                              ))}
                              <th style={{textAlign:'center',padding:'5px 8px',color:'var(--gold)',fontWeight:700,fontSize:'0.62rem',whiteSpace:'nowrap'}}>Avg</th>
                              <th style={{textAlign:'center',padding:'5px 6px',color:'var(--gold)',fontWeight:700,fontSize:'0.62rem'}}>Grade</th>
                            </tr>
                          </thead>
                          <tbody>
                            {examAverages.map((e,i)=>(
                              <tr key={i} style={{borderBottom:'1px solid var(--border)',background:i%2===0?'transparent':'rgba(255,255,255,0.025)'}}>
                                <td style={{padding:'5px 8px',whiteSpace:'nowrap',color:'var(--text2)',fontSize:'0.65rem'}}>{e.label}</td>
                                {subjectStats.map(ss=>{
                                  const found=e.subjects.find(s=>s.name===ss.name);
                                  const sc=found&&found.score!==null?found.score:null;
                                  return(
                                    <td key={ss.name} style={{textAlign:'center',padding:'5px 5px',fontWeight:sc!==null?700:400,color:sc!==null?pc(sc,e.grade):'var(--text2)'}}>
                                      {sc!==null?sc:'—'}
                                    </td>
                                  );
                                })}
                                <td style={{textAlign:'center',padding:'5px 8px',fontWeight:800,color:e.avg!==null?pc(e.avg,e.grade):'var(--text2)',whiteSpace:'nowrap'}}>
                                  {e.avg!==null?`${e.avg}%`:'—'}
                                </td>
                                <td style={{textAlign:'center',padding:'5px 6px',fontWeight:800,color:e.avg!==null?pc(e.avg,e.grade):'var(--text2)'}}>
                                  {e.avg!==null?pl(e.avg,e.grade):'—'}
                                </td>
                              </tr>
                            ))}
                            {/* Subject average row */}
                            <tr style={{borderTop:'2px solid var(--border)',background:'rgba(234,179,8,0.06)'}}>
                              <td style={{padding:'5px 8px',fontSize:'0.65rem',fontWeight:700,color:'var(--gold)'}}>Subject Avg</td>
                              {subjectStats.map(ss=>(
                                <td key={ss.name} style={{textAlign:'center',padding:'5px 5px',fontWeight:800,color:pc(ss.avg)}}>{ss.avg}</td>
                              ))}
                              <td style={{textAlign:'center',padding:'5px 8px',fontWeight:800,color:overallAvg!==null?pc(overallAvg):'var(--text2)'}}>
                                {overallAvg!==null?`${overallAvg}%`:'—'}
                              </td>
                              <td style={{textAlign:'center',padding:'5px 6px',fontWeight:800,color:overallPerf?.color||'var(--gold)'}}>
                                {overallPerf?(mMode?overallPerf.grade:overallPerf.code):'—'}
                              </td>
                            </tr>
                          </tbody>
                        </table>
                      </div>
                    </div>
                  </div>
                );
              })()}
            </div>
            <div className="modal-footer">
              <button className="btn btn-outline" onClick={()=>setViewId(null)}>Close</button>
              <button className="btn btn-gold" onClick={()=>{setEditId(viewStudent.id);setViewId(null);setShowForm(false);}}>✏️ Edit Student</button>
              <button className="btn btn-rose" onClick={()=>del(viewStudent.id)}>🗑 Remove</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}
function Alumni({alumni}){
  const [search,setSearch]=useState('');
  const filtered=alumni.filter(a=>a.name.toLowerCase().includes(search.toLowerCase()));
  return (
    <div>
      <div className="section-header">
        <h2>Alumni Registry ({alumni.length})</h2>
        <input placeholder="Search alumni..." value={search} onChange={e=>setSearch(e.target.value)} style={{width:200}}/>
      </div>
      <div className="alert alert-gold">🎓 Alumni are Grade 9 graduates automatically logged during grade promotion.</div>
      <div className="card">
        <div className="table-wrap">
          <table>
            <thead><tr><th>ID</th><th>Name</th><th>Exit Class</th><th>Year</th><th>Contact</th><th>Notes</th></tr></thead>
            <tbody>
              {filtered.length===0 ? <tr><td colSpan={6}><div className="empty"><div className="empty-icon">🎓</div>No alumni found</div></td></tr>
              : filtered.map(a=>(
                <tr key={a.id}>
                  <td className="mono fs-sm fc-text2">{a.id}</td>
                  <td className="fw6">{a.name}</td>
                  <td><span className="badge badge-purple">{a.grade}</span></td>
                  <td>{a.exitYear}</td>
                  <td>{a.contact||'—'}</td>
                  <td className="fc-text2 fs-sm">{a.notes||'—'}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

// ──────────── PROMOTE ────────────
function Promote({students,promoteAll,showToast,setStudents,setAlumni}){
  const grade9   = students.filter(s=>s.grade==='Grade 9');
  const byGrade  = GRADES.map(g=>({grade:g,count:students.filter(s=>s.grade===g).length,level:GRADE_LEVEL[g]}));
  const maxCount = Math.max(...byGrade.map(b=>b.count),1);

  // Group grades by level for display
  const levelGroups = [
    {label:'🧒 Early Childhood',grades:['Play Group','Pre-Primary 1','Pre-Primary 2']},
    {label:'📚 Primary',grades:['Grade 1','Grade 2','Grade 3','Grade 4','Grade 5','Grade 6']},
    {label:'🎓 Junior Secondary',grades:['Grade 7','Grade 8','Grade 9']},
  ];

  return (
    <div>
      <div className="section-header"><h2>Grade Promotion</h2></div>
      <div className="alert alert-gold">⚠️ Promotion moves every student up one grade level. Grade 9 students will be automatically logged as Alumni.</div>

      <div className="grid-2" style={{gap:20,marginBottom:20}}>
        <div className="card">
          <h2 style={{marginBottom:16,fontSize:'1rem'}}>Students per Grade</h2>
          {levelGroups.map(lg=>(
            <div key={lg.label} style={{marginBottom:14}}>
              <div style={{fontSize:'0.68rem',color:'var(--text2)',fontWeight:700,textTransform:'uppercase',letterSpacing:'1px',marginBottom:8,paddingBottom:4,borderBottom:'1px solid var(--border)'}}>{lg.label}</div>
              {lg.grades.map(g=>{
                const n=students.filter(s=>s.grade===g).length;
                return(
                  <div key={g} style={{display:'flex',alignItems:'center',gap:10,marginBottom:8}}>
                    <span style={{width:110,fontSize:'0.78rem',color:n>0?'var(--text)':'var(--text2)',flexShrink:0}}>{g}</span>
                    <div className="progress" style={{flex:1}}>
                      <div className="progress-fill" style={{width:(n/maxCount*100)+'%',background:`var(--${LEVEL_COLOR[GRADE_LEVEL[g]]})`}}></div>
                    </div>
                    <span className="mono fw6" style={{width:20,fontSize:'0.85rem',color:n>0?'var(--text)':'var(--text2)'}}>{n}</span>
                  </div>
                );
              })}
            </div>
          ))}
        </div>

        <div className="card">
          <h2 style={{marginBottom:16,fontSize:'1rem',color:'var(--gold)'}}>Grade 9 → Alumni</h2>
          <div className="alert alert-teal" style={{marginBottom:12,fontSize:'0.78rem'}}>
            These students complete Junior Secondary and will be logged as Alumni.
          </div>
          {grade9.length===0
            ? <div className="empty"><div className="empty-icon">✅</div>No Grade 9 students yet</div>
            : grade9.map(s=>(
                <div key={s.id} style={{display:'flex',alignItems:'center',gap:10,marginBottom:8,padding:'8px 10px',background:'var(--navy3)',borderRadius:7}}>
                  <span>🎓</span>
                  <div>
                    <div className="fw6 fs-sm">{s.name}</div>
                    <div className="fc-text2" style={{fontSize:'0.72rem'}}>{s.id} · {s.parent}</div>
                  </div>
                </div>
              ))
          }
          {grade9.length>0&&<div className="alert alert-rose mt-16">{grade9.length} student(s) will be moved to Alumni.</div>}
        </div>
      </div>

      <div className="card" style={{textAlign:'center',padding:32}}>
        <div style={{fontSize:'3rem',marginBottom:12}}>⬆️</div>
        <h2 style={{marginBottom:8}}>Promote All Students</h2>
        <p style={{color:'var(--text2)',marginBottom:8,fontSize:'0.875rem'}}>Advances every student one grade level.</p>
        <div style={{display:'flex',justifyContent:'center',gap:16,marginBottom:20,flexWrap:'wrap',fontSize:'0.82rem',color:'var(--text2)'}}>
          <span>🧒 Play Group → Pre-Primary 1</span>
          <span>📚 PP2 → Grade 1</span>
          <span>📚 Grade 6 → Grade 7 (JSS)</span>
          <span>🎓 Grade 9 → Alumni</span>
        </div>
        <button className="btn btn-gold" style={{fontSize:'1rem',padding:'12px 32px'}} onClick={promoteAll}>
          🎉 Promote All Students
        </button>
      </div>
    </div>
  );
}

// ──────────── FEES ────────────
function Fees({students,fees,setFees,showToast,setReceipt}){
  const [showForm,setShowForm]=useState(false);
  const [form,setForm]=useState({studentId:'',term:'Term 1 2025',amount:'8500',paid:'',method:'M-Pesa',ref:'',date:today()});
  const [filter,setFilter]=useState('all');

  const filtered = filter==='all'?fees:fees.filter(f=>f.status===filter);

  const save=()=>{
    if(!form.studentId||!form.paid){showToast('Please fill required fields','rose');return;}
    const paidNum=parseFloat(form.paid);
    const amtNum=parseFloat(form.amount);
    const status=paidNum>=amtNum?'paid':paidNum>0?'partial':'pending';
    const newFee={id:'F'+uid(),...form,amount:amtNum,paid:paidNum,status,ref:form.ref||'REF'+uid()};
    setFees(p=>[...p,newFee]);
    setShowForm(false);
    setForm({studentId:'',term:'Term 1 2025',amount:'8500',paid:'',method:'M-Pesa',ref:'',date:today()});
    showToast('Payment recorded!');
  };

  return (
    <div>
      <div className="section-header">
        <h2>Fees Management</h2>
        <div className="flex gap-8">
          <select value={filter} onChange={e=>setFilter(e.target.value)}>
            <option value="all">All</option>
            <option value="paid">Paid</option>
            <option value="partial">Partial</option>
            <option value="pending">Pending</option>
          </select>
          <button className="btn btn-gold" onClick={()=>setShowForm(true)}>+ Record Payment</button>
        </div>
      </div>

      <div className="stat-grid" style={{gridTemplateColumns:'repeat(3,1fr)'}}>
        <div className="stat-card green"><div className="stat-label">Total Collected</div><div className="stat-value mono" style={{fontSize:'1.4rem'}}>{fmt(fees.reduce((a,f)=>a+f.paid,0))}</div></div>
        <div className="stat-card rose"><div className="stat-label">Balance Due</div><div className="stat-value mono" style={{fontSize:'1.4rem'}}>{fmt(fees.reduce((a,f)=>a+(f.amount-f.paid),0))}</div></div>
        <div className="stat-card gold"><div className="stat-label">Total Expected</div><div className="stat-value mono" style={{fontSize:'1.4rem'}}>{fmt(fees.reduce((a,f)=>a+f.amount,0))}</div></div>
      </div>

      {showForm && (
        <div className="card" style={{marginBottom:20}}>
          <div className="section-header"><h2>Record Payment</h2><button className="close-btn" onClick={()=>setShowForm(false)}>×</button></div>
          <div className="form-grid">
            <div className="form-group"><label>Student *</label>
              <select value={form.studentId} onChange={e=>setForm(p=>({...p,studentId:e.target.value}))}>
                <option value="">Select student...</option>
                {students.map(s=><option key={s.id} value={s.id}>{s.name} ({s.grade})</option>)}
              </select>
            </div>
            <div className="form-group"><label>Term</label>
              <select value={form.term} onChange={e=>setForm(p=>({...p,term:e.target.value}))}>
                {['Term 1 2025','Term 2 2025','Term 3 2025','Term 1 2024','Term 2 2024','Term 3 2024'].map(t=><option key={t}>{t}</option>)}
              </select>
            </div>
            <div className="form-group"><label>Total Amount (KES)</label><input type="number" value={form.amount} onChange={e=>setForm(p=>({...p,amount:e.target.value}))}/></div>
            <div className="form-group"><label>Amount Paid *</label><input type="number" value={form.paid} onChange={e=>setForm(p=>({...p,paid:e.target.value}))}/></div>
            <div className="form-group"><label>Payment Method</label>
              <select value={form.method} onChange={e=>setForm(p=>({...p,method:e.target.value}))}>
                <option>M-Pesa</option><option>Bank</option><option>Cash</option><option>Cheque</option>
              </select>
            </div>
            <div className="form-group"><label>Reference No.</label><input value={form.ref} onChange={e=>setForm(p=>({...p,ref:e.target.value}))}/></div>
            <div className="form-group"><label>Date</label><input type="date" value={form.date} onChange={e=>setForm(p=>({...p,date:e.target.value}))}/></div>
          </div>
          <div className="flex gap-8 mt-16">
            <button className="btn btn-gold" onClick={save}>Save Payment</button>
            <button className="btn btn-outline" onClick={()=>setShowForm(false)}>Cancel</button>
          </div>
        </div>
      )}

      <div className="card desktop-only">
        <div className="table-wrap">
          <table>
            <thead><tr><th>Student</th><th>Term</th><th>Expected</th><th>Paid</th><th>Balance</th><th>Method</th><th>Date</th><th>Status</th><th>Receipt</th></tr></thead>
            <tbody>
              {filtered.map(f=>{
                const s=students.find(st=>st.id===f.studentId);
                const bal=f.amount-f.paid;
                return (
                  <tr key={f.id}>
                    <td className="fw6">{s?.name||'Unknown'}<div className="fc-text2 fs-sm">{s?.grade}</div></td>
                    <td className="fs-sm fc-text2">{f.term}</td>
                    <td className="mono">{fmt(f.amount)}</td>
                    <td className="mono fc-green fw6">{fmt(f.paid)}</td>
                    <td className="mono" style={{color:bal>0?'var(--rose)':'var(--green)'}}>{fmt(bal)}</td>
                    <td><span className="badge badge-teal">{f.method}</span></td>
                    <td className="fc-text2 fs-sm">{f.date?fmtDate(f.date):'—'}</td>
                    <td><span className={`badge badge-${f.status==='paid'?'green':f.status==='partial'?'gold':'rose'}`}>{f.status}</span></td>
                    <td>{f.paid>0&&<button className="btn btn-teal btn-sm" onClick={()=>setReceipt(f)}>🧾 View</button>}</td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </div>
      {/* Mobile fee cards */}
      <div className="m-card-list">
        {filtered.map(f=>{
          const s=students.find(st=>st.id===f.studentId);
          const bal=f.amount-f.paid;
          return(
            <div key={f.id} className="m-card-item">
