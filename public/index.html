function AccountManager({ session, showToast }){
  const [accounts, setAccountsState] = useState(()=>loadAccounts()||getDefaultAccounts());
  const [showForm, setShowForm] = useState(false);
  const [editId,   setEditId]   = useState(null);
  const [form,     setForm]     = useState({username:'',name:'',pin:'',role:'teacher'});
  const [pinErr,   setPinErr]   = useState('');
  const [changingPin, setChangingPin] = useState(null); // userId for own PIN change
  const [newPin, setNewPin] = useState('');

  const persist = (updated) => { saveAccounts(updated); setAccountsState(updated); };

  const openNew = () => { setForm({username:'',name:'',pin:'',role:'teacher'}); setEditId(null); setPinErr(''); setShowForm(true); };
  const openEdit = (a) => { setForm({username:a.username,name:a.name,pin:'',role:a.role}); setEditId(a.id); setPinErr(''); setShowForm(true); };

  const save = () => {
    if(!form.username.trim()||!form.name.trim()){ showToast('Username and name required','rose'); return; }
    if(!editId && !form.pin){ showToast('PIN required for new user','rose'); return; }
    if(form.pin && (form.pin.length < 4 || !/^\d+$/.test(form.pin))){ setPinErr('PIN must be 4–8 digits'); return; }
    setPinErr('');
    if(editId){
      persist(accounts.map(a=>a.id===editId?{...a,username:form.username.trim(),name:form.name.trim(),role:form.role,...(form.pin?{pinHash:hashPin(form.pin)}:{})}:a));
      showToast('Account updated');
    } else {
      const exists = accounts.find(a=>a.username.toLowerCase()===form.username.trim().toLowerCase());
      if(exists){ showToast('Username already taken','rose'); return; }
      persist([...accounts,{id:'U'+uid(),username:form.username.trim(),name:form.name.trim(),pinHash:hashPin(form.pin),role:form.role,active:true}]);
      showToast('Account created');
    }
    setShowForm(false);
  };

  const toggleActive = (id) => {
    if(id===session.id){ showToast("Can't deactivate your own account",'rose'); return; }
    persist(accounts.map(a=>a.id===id?{...a,active:!a.active}:a));
  };
  const del = (id) => {
    if(id===session.id){ showToast("Can't delete your own account",'rose'); return; }
    if(!confirm('Delete this account?')) return;
    persist(accounts.filter(a=>a.id!==id));
    showToast('Account deleted','rose');
  };

  const saveOwnPin = () => {
    if(!newPin||newPin.length<4||!/^\d+$/.test(newPin)){ showToast('PIN must be 4–8 digits','rose'); return; }
    persist(accounts.map(a=>a.id===session.id?{...a,pinHash:hashPin(newPin)}:a));
    setChangingPin(null); setNewPin('');
    showToast('PIN updated successfully ✅');
  };

  return(
    <div className="card">
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
        <h2 style={{fontSize:'1rem',color:'var(--gold)'}}>👥 User Accounts</h2>
        {session?.role==='admin' && <button className="btn btn-gold btn-sm" onClick={openNew}>+ Add User</button>}
      </div>

      {/* Own PIN change */}
      <div style={{background:'var(--navy3)',borderRadius:8,padding:'12px 14px',marginBottom:14,border:'1px solid var(--border)'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <div style={{fontSize:'0.78rem',color:'var(--text2)'}}>🔑 Change your PIN ({session?.username})</div>
          {changingPin!==session?.id
            ? <button className="btn btn-outline btn-sm" onClick={()=>{setChangingPin(session?.id);setNewPin('');}}>Change PIN</button>
            : <div style={{display:'flex',gap:8,alignItems:'center'}}>
                <input type="password" value={newPin} onChange={e=>setNewPin(e.target.value)} placeholder="New PIN (4–8 digits)" inputMode="numeric" maxLength={8}
                  style={{width:160}} onKeyDown={e=>e.key==='Enter'&&saveOwnPin()}/>
                <button className="btn btn-gold btn-sm" onClick={saveOwnPin}>Save</button>
                <button className="btn btn-outline btn-sm" onClick={()=>setChangingPin(null)}>Cancel</button>
              </div>
          }
        </div>
      </div>

      {/* Account list */}
      {accounts.map(a=>(
        <div key={a.id} style={{display:'flex',alignItems:'center',gap:10,padding:'10px 12px',background:a.active?'var(--navy3)':'rgba(255,255,255,0.02)',borderRadius:8,marginBottom:8,border:`1px solid ${a.id===session?.id?'rgba(240,165,0,0.3)':'var(--border)'}`,opacity:a.active?1:0.5}}>
          <div style={{flex:1}}>
            <div style={{display:'flex',alignItems:'center',gap:8,flexWrap:'wrap'}}>
              <span style={{fontWeight:700,fontSize:'0.88rem'}}>{a.name}</span>
              <span className={`role-badge ${ROLES[a.role]?.color}`}>{ROLES[a.role]?.icon} {ROLES[a.role]?.label}</span>
              {a.id===session?.id&&<span style={{fontSize:'0.65rem',color:'var(--gold)',fontWeight:600}}>● You</span>}
              {!a.active&&<span style={{fontSize:'0.65rem',color:'var(--rose)',fontWeight:600}}>Disabled</span>}
            </div>
            <div style={{fontSize:'0.7rem',color:'var(--text2)',marginTop:2}}>@{a.username}</div>
          </div>
          {session?.role==='admin' && a.id!==session?.id &&(
            <div style={{display:'flex',gap:6,flexShrink:0}}>
              <button className="btn btn-outline btn-sm" onClick={()=>openEdit(a)}>✏️</button>
              <button className="btn btn-outline btn-sm" onClick={()=>toggleActive(a.id)} style={{color:a.active?'var(--rose)':'var(--green)'}}>
                {a.active?'Disable':'Enable'}
              </button>
              <button className="btn btn-rose btn-sm" onClick={()=>del(a.id)}>🗑</button>
            </div>
          )}
        </div>
      ))}

      {/* Role legend */}
      <div style={{marginTop:10,padding:'10px 12px',background:'rgba(255,255,255,0.02)',borderRadius:8,fontSize:'0.72rem',color:'var(--text2)'}}>
        <div style={{fontWeight:700,color:'var(--text)',marginBottom:6}}>Role permissions:</div>
        {Object.entries(ROLES).map(([k,v])=>(
          <div key={k} style={{marginBottom:4,display:'flex',gap:8,alignItems:'flex-start'}}>
            <span className={`role-badge ${v.color}`}>{v.icon} {v.label}</span>
            <span style={{lineHeight:1.5}}>{v.desc}</span>
          </div>
        ))}
      </div>

      {/* Add/Edit form modal */}
      {showForm&&(
        <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&setShowForm(false)}>
          <div className="modal" style={{maxWidth:420}}>
            <div className="modal-header">
              <h2>{editId?'Edit Account':'New Account'}</h2>
              <button className="close-btn" onClick={()=>setShowForm(false)}>×</button>
            </div>
            <div className="modal-body">
              <div className="form-group">
                <label>Full Name</label>
                <input value={form.name} onChange={e=>setForm(p=>({...p,name:e.target.value}))} placeholder="e.g. John Kamau"/>
              </div>
              <div className="form-group">
                <label>Username</label>
                <input value={form.username} onChange={e=>setForm(p=>({...p,username:e.target.value.replace(/\s/,'')}))} placeholder="e.g. jkamau" autoCapitalize="none"/>
              </div>
              <div className="form-group">
                <label>{editId?'New PIN (leave blank to keep current)':'PIN (4–8 digits)'}</label>
                <input type="password" value={form.pin} onChange={e=>setForm(p=>({...p,pin:e.target.value}))} placeholder="e.g. 1234" inputMode="numeric" maxLength={8}/>
                {pinErr&&<span style={{color:'var(--rose)',fontSize:'0.72rem'}}>{pinErr}</span>}
              </div>
              <div className="form-group">
                <label>Role</label>
                <select value={form.role} onChange={e=>setForm(p=>({...p,role:e.target.value}))}>
                  {Object.entries(ROLES).map(([k,v])=><option key={k} value={k}>{v.icon} {v.label} — {v.desc}</option>)}
                </select>
              </div>
            </div>
            <div className="modal-footer">
              <button className="btn btn-outline" onClick={()=>setShowForm(false)}>Cancel</button>
              <button className="btn btn-gold" onClick={save}>💾 {editId?'Save Changes':'Create Account'}</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function ATSettings({atConfig,setAtConfig,showToast,exportData,importData,clearAllData,syncConfig,updateSyncConfig,syncStatus,syncMsg,lastSync,manualPush,manualPull,session}){
  const [form,setForm]=useState({...atConfig});
  const [testing,setTesting]=useState(false);
  const [testResult,setTestResult]=useState(null);
  const [testPhone,setTestPhone]=useState('');
  const [proxyStatus,setProxyStatus]=useState(null);
  const recheckProxy=()=>{
    const url=(form.proxyUrl&&form.proxyUrl.trim())||window.location.origin;
    setProxyStatus(null);
    fetch(`${url}/api/ping`).then(r=>r.json()).then(d=>{window._proxyReachable=d.ok===true;setProxyStatus(d.ok?'online':'offline');}).catch(()=>{window._proxyReachable=false;setProxyStatus('offline');});
  };
  useEffect(()=>{ recheckProxy(); },[]);

  const save=()=>{
    setAtConfig({...form});
    showToast('Credentials saved!');
  };

  const testSms=async()=>{
    const phone=normalizePhone(testPhone);
    if(!phone){showToast('Enter a valid phone number','rose');return;}
    setTesting(true);setTestResult(null);
    const results=await sendATSms([phone],'Tumaini Valley Springs Academy Test: SMS delivery from Africa\'s Talking is working correctly.',form);
    setTestResult({type:'sms',result:results[0]});
    setTesting(false);
  };

  const testWa=async()=>{
    const phone=normalizePhone(testPhone);
    if(!phone){showToast('Enter a valid phone number','rose');return;}
    setTesting(true);setTestResult(null);
    const results=await sendATWhatsApp([phone],'Tumaini Valley Springs Academy Test: WhatsApp delivery from Africa\'s Talking is working correctly.',form);
    setTestResult({type:'whatsapp',result:results[0]});
    setTesting(false);
  };

  return(
    <div>
      {/* Live Proxy Status Banner */}
      <div className={`alert ${proxyStatus==='online'?'alert-green':proxyStatus==='offline'?'alert-rose':'alert-gold'}`} style={{marginBottom:16,alignItems:'flex-start'}}>

          <strong>Proxy Server: {proxyStatus==='online'?'ONLINE':proxyStatus==='offline'?'OFFLINE':'Checking...'}</strong>

          {proxyStatus==='offline'&&<div style={{fontSize:'0.78rem',marginTop:2,lineHeight:1.6}}>
            <strong>Option A — Local:</strong> Open terminal in app folder → <span style={{fontFamily:'monospace',background:'rgba(0,0,0,0.35)',padding:'1px 7px',borderRadius:4}}>node server.js</span> → open <span style={{fontFamily:'monospace'}}>http://localhost:3000</span><br/>
            <strong>Option B — Remote (Railway):</strong> See setup guide below. After deploy, paste your Railway URL in the <em>Proxy URL</em> field and recheck.

        </div>
        <button className="btn btn-outline btn-sm" style={{flexShrink:0}} onClick={recheckProxy}>↻ Recheck</button>

      <div className="alert alert-gold" style={{marginBottom:20}}>
        <div>
          <strong>How to get credentials:</strong> Sign up at <strong>africastalking.com</strong> → Dashboard → Settings → API Key.<br/>

          <h2 style={{fontSize:'1rem',marginBottom:16,color:'var(--gold)'}}>🔑 API Credentials</h2>
          <div style={{display:'flex',flexDirection:'column',gap:12}}>
            <div className="form-group">
              <label>Mode</label>
              <div style={{display:'flex',gap:8}}>
                <button className={`btn ${form.sandbox?'btn-teal':'btn-outline'}`} onClick={()=>setForm(p=>({...p,sandbox:true,username:'sandbox'}))}>
                  🧪 Sandbox (Free Testing)
                </button>

          </div>

          <div style={{borderTop:'1px solid var(--border)',margin:'16px 0',paddingTop:16}}>
            <h2 style={{fontSize:'0.95rem',marginBottom:12,color:'var(--purple)'}}>💬 WhatsApp Settings</h2>
            <div style={{display:'flex',flexDirection:'column',gap:10}}>
              <div className="form-group">
                <label>WhatsApp Enabled</label>
                <div style={{display:'flex',gap:8}}>
                  <button className={`btn ${form.whatsappEnabled?'btn-green':'btn-outline'}`} onClick={()=>setForm(p=>({...p,whatsappEnabled:true}))}>✓ Enabled</button>
                  <button className={`btn ${!form.whatsappEnabled?'btn-rose':'btn-outline'}`} onClick={()=>setForm(p=>({...p,whatsappEnabled:false}))}>✗ Disabled</button>
                </div>
              </div>
              {form.whatsappEnabled&&(
                <div className="form-group">
                  <label>WhatsApp Sender Number</label>
                  <input value={form.whatsappFrom} onChange={e=>setForm(p=>({...p,whatsappFrom:e.target.value}))} placeholder="+254700000000"/>
                  <span style={{fontSize:'0.7rem',color:'var(--text2)',marginTop:3}}>Must be an approved WhatsApp Business number from Africa's Talking.</span>
                </div>
              )}
            </div>
          </div>

          <div style={{borderTop:'1px solid var(--border)',margin:'16px 0',paddingTop:16}}>
            <h2 style={{fontSize:'0.95rem',marginBottom:12,color:'var(--teal)'}}>🌐 Remote Proxy URL</h2>
            <div className="form-group">
              <label>Proxy Server URL <span style={{fontWeight:400,color:'var(--text2)'}}>(leave blank for local)</span></label>
              <input value={form.proxyUrl||''} onChange={e=>setForm(p=>({...p,proxyUrl:e.target.value}))} placeholder="https://your-app.up.railway.app"/>
              <span style={{fontSize:'0.7rem',color:'var(--text2)',marginTop:3}}>Paste your Railway/Render deployment URL here to use the app from anywhere without running <span style={{fontFamily:'monospace'}}>node server.js</span>.</span>
            </div>
          </div>

          <button className="btn btn-gold" style={{width:'100%',justifyContent:'center',marginTop:4}} onClick={save}>💾 Save Credentials</button>
        </div>

        <div style={{display:'flex',flexDirection:'column',gap:16}}>
          <div className="card">
            <h2 style={{fontSize:'1rem',marginBottom:14}}>🧪 Send Test Message</h2>
            <div className="form-group" style={{marginBottom:12}}>
              <label>Test Phone Number</label>
              <input value={testPhone} onChange={e=>setTestPhone(e.target.value)} placeholder="0712345678"/>
            </div>
            <div style={{display:'flex',gap:8}}>
              <button className="btn btn-teal" style={{flex:1,justifyContent:'center'}} onClick={testSms} disabled={testing}>
                {testing?'⏳...':'📱 Test SMS'}
              </button>
              <button className="btn btn-purple" style={{flex:1,justifyContent:'center'}} onClick={testWa} disabled={testing||(!form.whatsappEnabled&&!form.sandbox)}>
                {testing?'⏳...':'💬 Test WhatsApp'}
              </button>
            </div>
            {testResult&&(
              <div className={`alert ${testResult.result.status==='Success'?'alert-green':'alert-rose'}`} style={{marginTop:12,fontSize:'0.8rem'}}>
                <div><strong>{testResult.type.toUpperCase()}:</strong> {testResult.result.status}</div>
                {testResult.result.messageId&&testResult.result.messageId!=='—'&&<div className="mono" style={{fontSize:'0.72rem'}}>ID: {testResult.result.messageId}</div>}
                {testResult.result.cost&&testResult.result.cost!=='—'&&<div>Cost: {testResult.result.cost}</div>}
              </div>
            )}
          </div>

          <div className="card">
            <h2 style={{fontSize:'1rem',marginBottom:12}}>📋 Setup Checklist</h2>
            {[
              {done:!!form.username,label:'Africa\'s Talking username set'},
              {done:form.sandbox||!!form.apiKey,label:'API key configured (or sandbox mode)'},
              {done:!!form.shortCode,label:'SMS sender ID set'},
              {done:!form.whatsappEnabled||(form.whatsappEnabled&&!!form.whatsappFrom),label:'WhatsApp sender configured (if enabled)'},
            ].map((c,i)=>(
              <div key={i} style={{display:'flex',alignItems:'center',gap:10,padding:'7px 0',borderBottom:'1px solid var(--border)',fontSize:'0.82rem'}}>
                <span style={{color:c.done?'var(--green)':'var(--rose)',fontSize:'1rem'}}>{c.done?'✅':'⬜'}</span>
                <span style={{color:c.done?'var(--text)':'var(--text2)'}}>{c.label}</span>
              </div>
            ))}
          </div>

          <div className="card">
            <h2 style={{fontSize:'1rem',marginBottom:10}}>🚀 How to Use Remotely (Render)</h2>
            <div style={{fontSize:'0.8rem',color:'var(--text2)',lineHeight:1.8}}>
              <div style={{background:'rgba(99,179,237,0.08)',border:'1px solid rgba(99,179,237,0.2)',borderRadius:7,padding:'8px 12px',marginBottom:10,fontSize:'0.75rem',color:'var(--text)'}}>
                Deploy Tumaini Valley Springs Academy to <strong style={{color:'#63b3ed'}}>Render.com</strong> (free tier) — SMS works from any device, no PC required.
              </div>
              <div style={{display:'flex',flexDirection:'column',gap:7}}>
                {[
                  {n:'1',text:<>Go to <strong style={{color:'#63b3ed'}}>render.com</strong> → <strong>Sign up free</strong> with your GitHub account</>},
                  {n:'2',text:<>Push your project folder to a <strong>GitHub repository</strong> (include <span style={{fontFamily:'monospace',fontSize:'0.72rem'}}>render.yaml</span>, <span style={{fontFamily:'monospace',fontSize:'0.72rem'}}>server.js</span>, <span style={{fontFamily:'monospace',fontSize:'0.72rem'}}>public/</span>, <span style={{fontFamily:'monospace',fontSize:'0.72rem'}}>package.json</span>)</>},
                  {n:'3',text:<>On Render dashboard → <strong>New +</strong> → <strong>Web Service</strong> → <strong>Connect a repository</strong> → select your repo</>},
                  {n:'4',text:<>Render auto-reads <span style={{fontFamily:'monospace',fontSize:'0.72rem'}}>render.yaml</span>. Confirm settings: <em>Build:</em> <span style={{fontFamily:'monospace',fontSize:'0.72rem'}}>npm install</span> · <em>Start:</em> <span style={{fontFamily:'monospace',fontSize:'0.72rem'}}>node server.js</span> · <em>Plan:</em> Free</>},
                  {n:'5',text:<>Click <strong>Deploy Web Service</strong> — wait ~2 min for the first build</>},
                  {n:'6',text:<>Render gives you a URL like <span style={{fontFamily:'monospace',fontSize:'0.72rem',color:'#63b3ed'}}>https://edutrack-xxxx.onrender.com</span></>},
                  {n:'7',text:<>Paste that URL in the <strong>Proxy URL</strong> field above → Save → ↻ Recheck</>},
                  {n:'8',text:<>Share the Render URL with anyone — works on any phone or browser 🌍</>},
                ].map(s=>(
                  <div key={s.n} style={{display:'flex',gap:8,alignItems:'flex-start'}}>
                    <span style={{background:'#63b3ed',color:'#0a0f1e',borderRadius:'50%',width:18,height:18,display:'flex',alignItems:'center',justifyContent:'center',fontSize:'0.62rem',fontWeight:800,flexShrink:0,marginTop:2}}>{s.n}</span>
                    <span style={{color:'var(--text)',lineHeight:1.6}}>{s.text}</span>
                  </div>
                ))}
              </div>
              <div style={{marginTop:12,background:'rgba(234,179,8,0.07)',border:'1px solid rgba(234,179,8,0.18)',borderRadius:7,padding:'8px 12px',fontSize:'0.72rem'}}>
                ⚠️ <strong>Free tier note:</strong> Render free web services spin down after 15 min of inactivity and take ~30 sec to wake up on first request. Upgrade to a paid plan ($7/mo) for always-on service.
              </div>
              <div style={{marginTop:8,fontSize:'0.7rem',color:'var(--text2)',paddingTop:6,borderTop:'1px solid var(--border)'}}>
                <strong>Local alternative:</strong> run <span style={{fontFamily:'monospace'}}>node server.js</span> → open <span style={{fontFamily:'monospace',color:'var(--gold)'}}>http://localhost:3000</span>
              </div>
            </div>
          </div>

          {/* ── CLOUD SYNC ── */}
          <div className="card" style={{border:'1px solid rgba(99,179,237,0.3)'}}>
            <h2 style={{fontSize:'1rem',marginBottom:4,color:'#63b3ed'}}>☁️ Cloud Sync — Cross-Device</h2>
            <p style={{fontSize:'0.76rem',color:'var(--text2)',marginBottom:14,lineHeight:1.6}}>
              Data recorded on your laptop will automatically appear on your phone (and vice versa).
              Requires your Render server URL and the sync secret you set on Render.
            </p>

            {/* Status banner */}
            <div style={{background:syncStatus==='ok'?'rgba(34,197,94,0.08)':syncStatus==='error'?'rgba(239,68,68,0.08)':'rgba(234,179,8,0.08)',border:`1px solid ${syncStatus==='ok'?'rgba(34,197,94,0.25)':syncStatus==='error'?'rgba(239,68,68,0.25)':'rgba(234,179,8,0.25)'}`,borderRadius:8,padding:'10px 14px',marginBottom:14,display:'flex',alignItems:'center',gap:10,fontSize:'0.76rem'}}>
              <span style={{fontSize:'1.2rem',flexShrink:0}}>{syncStatus==='ok'?'✅':syncStatus==='error'?'❌':syncStatus==='syncing'||syncStatus==='pending'?'⏳':'☁️'}</span>
              <div style={{flex:1}}>
                <strong>{syncStatus==='ok'?'Sync Active':syncStatus==='error'?'Sync Error':syncStatus==='syncing'||syncStatus==='pending'?'Syncing…':'Not Configured'}</strong>
                <div style={{color:'var(--text2)',marginTop:2,fontSize:'0.72rem'}}>{syncMsg||'Configure below to enable cross-device sync.'}</div>
                {lastSync&&<div style={{color:'var(--text2)',fontSize:'0.68rem',marginTop:1}}>Last sync: {lastSync}</div>}
              </div>
            </div>

            {/* Config fields */}
            <div className="form-group" style={{marginBottom:10}}>
              <label style={{fontSize:'0.72rem',textTransform:'uppercase',letterSpacing:'0.8px',fontWeight:600,color:'var(--text2)'}}>Render Server URL</label>
              <input value={syncConfig.proxyUrl||''} onChange={e=>updateSyncConfig({...syncConfig,proxyUrl:e.target.value.trim()})}
                placeholder="https://edutrack-xxxx.onrender.com" style={{marginTop:4}}/>
            </div>
            <div className="form-group" style={{marginBottom:14}}>
              <label style={{fontSize:'0.72rem',textTransform:'uppercase',letterSpacing:'0.8px',fontWeight:600,color:'var(--text2)'}}>Sync Secret <span style={{fontWeight:400,color:'var(--text2)'}}>(the SYNC_SECRET you set on Render)</span></label>
              <input type="password" value={syncConfig.syncSecret||''} onChange={e=>updateSyncConfig({...syncConfig,syncSecret:e.target.value})}
                placeholder="Your secret password" style={{marginTop:4}}/>
              <span style={{fontSize:'0.68rem',color:'var(--text2)',marginTop:3}}>This protects your data. Must match the SYNC_SECRET environment variable on Render.</span>
            </div>

            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
              <button className="btn btn-gold" style={{justifyContent:'center'}} onClick={manualPush}>⬆️ Push to Cloud</button>
              <button className="btn btn-teal" style={{justifyContent:'center'}} onClick={manualPull}>⬇️ Pull from Cloud</button>
            </div>

            <div style={{marginTop:12,background:'rgba(99,179,237,0.06)',borderRadius:7,padding:'10px 12px',fontSize:'0.72rem',color:'var(--text2)',lineHeight:1.7}}>
              <strong style={{color:'#63b3ed'}}>How it works:</strong> Every change auto-saves to cloud 3 seconds after you stop editing.
              When you open the app on another device, it loads the latest data from cloud automatically.
            </div>
          </div>

          {/* ── USER ACCOUNTS ── */}
          <AccountManager session={session} showToast={showToast}/>

          {/* ── DATA BACKUP & RESTORE ── */}
          <div className="card" style={{border:'1px solid rgba(99,179,237,0.25)'}}>
            <h2 style={{fontSize:'1rem',marginBottom:4}}>💾 Data Backup &amp; Restore</h2>
            <p style={{fontSize:'0.76rem',color:'var(--text2)',marginBottom:14,lineHeight:1.6}}>
              All data is saved automatically in your browser's local storage — it survives page refreshes and browser restarts.
              Use <strong>Export</strong> to download a backup file, and <strong>Import</strong> to restore it on any device.
            </p>

            {/* Storage status */}
            <div style={{background:'rgba(34,197,94,0.07)',border:'1px solid rgba(34,197,94,0.2)',borderRadius:8,padding:'10px 14px',marginBottom:14,fontSize:'0.76rem',display:'flex',alignItems:'center',gap:10}}>
              <span style={{fontSize:'1.1rem'}}>✅</span>
              <div>
                <strong style={{color:'var(--green)'}}>Auto-save Active</strong>
                <div style={{color:'var(--text2)',marginTop:2}}>Every change is saved instantly to this browser. Data persists across sessions.</div>
              </div>
            </div>

            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:10}}>
              <button className="btn btn-gold" style={{justifyContent:'center',gap:8}} onClick={exportData}>
                ⬇️ Export Backup
              </button>
              <label className="btn btn-teal" style={{justifyContent:'center',gap:8,cursor:'pointer',margin:0}}>
                ⬆️ Import Backup
                <input type="file" accept=".json" onChange={importData} style={{display:'none'}}/>
              </label>
            </div>

            <div style={{background:'rgba(239,68,68,0.06)',border:'1px solid rgba(239,68,68,0.18)',borderRadius:8,padding:'10px 14px',fontSize:'0.74rem'}}>
              <div style={{fontWeight:700,color:'var(--rose)',marginBottom:6}}>⚠️ Important — Read This</div>
              <ul style={{margin:0,paddingLeft:16,color:'var(--text2)',lineHeight:1.8}}>
                <li>Data is stored <strong>per browser</strong> — Chrome on PC ≠ Safari on phone</li>
                <li>Clearing browser data / cache <strong>will erase</strong> everything</li>
                <li><strong>Export a backup weekly</strong> — store it in Google Drive or WhatsApp</li>
                <li>To move to a new device: Export → send .json to new device → Import</li>
              </ul>
              <button className="btn btn-rose btn-sm" style={{marginTop:10,width:'100%',justifyContent:'center'}} onClick={clearAllData}>
                🗑 Clear All Data (Irreversible)
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.render(<Root/>, document.getElementById('root'));
</script>
</body>
</html>
