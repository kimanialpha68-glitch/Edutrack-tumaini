// ──────────── INVENTORY ────────────
function Inventory({inventory,setInventory,showToast}){
  const [showForm,setShowForm]=useState(false);
  const [form,setForm]=useState({name:'',category:'Stationery',qty:'',minQty:'',unit:'pcs',unitCost:'',supplier:''});
  const [search,setSearch]=useState('');
  const [catFilter,setCatFilter]=useState('');
  const [editId,setEditId]=useState(null);
  const [adjustId,setAdjustId]=useState(null);
  const [adjQty,setAdjQty]=useState('');

  const cats=['Stationery','Furniture','Medical','Sports','Electronics','Other'];
  const filtered=inventory.filter(i=>{
    const q=search.toLowerCase();
    return i.name.toLowerCase().includes(q)&&(!catFilter||i.category===catFilter);
  });

  const save=()=>{
    if(!form.name){showToast('Name required','rose');return;}
    if(editId){
      setInventory(p=>p.map(i=>i.id===editId?{...i,...form,qty:parseFloat(form.qty),minQty:parseFloat(form.minQty),unitCost:parseFloat(form.unitCost),lastUpdated:today()}:i));
      showToast('Item updated!');
    } else {
      setInventory(p=>[...p,{id:'I'+uid(),...form,qty:parseFloat(form.qty),minQty:parseFloat(form.minQty),unitCost:parseFloat(form.unitCost),lastUpdated:today()}]);
      showToast('Item added!');
    }
    setShowForm(false);setEditId(null);
    setForm({name:'',category:'Stationery',qty:'',minQty:'',unit:'pcs',unitCost:'',supplier:''});
  };

  const startEdit=(i)=>{
    setForm({name:i.name,category:i.category,qty:i.qty,minQty:i.minQty,unit:i.unit,unitCost:i.unitCost,supplier:i.supplier});
    setEditId(i.id);setShowForm(true);
  };

  const adjustStock=(id,delta)=>{
    const adj=parseFloat(adjQty);
    if(isNaN(adj)){showToast('Enter valid quantity','rose');return;}
    setInventory(p=>p.map(i=>i.id===id?{...i,qty:Math.max(0,i.qty+(delta*adj)),lastUpdated:today()}:i));
    setAdjustId(null);setAdjQty('');
    showToast('Stock adjusted!');
  };

  const totalValue = inventory.reduce((a,i)=>a+(i.qty*i.unitCost),0);

  return (
    <div>
      <div className="section-header">
        <h2>Inventory ({inventory.length} items)</h2>
        <div className="flex gap-8">
          <input placeholder="Search..." value={search} onChange={e=>setSearch(e.target.value)} style={{width:160}}/>
          <select value={catFilter} onChange={e=>setCatFilter(e.target.value)}>
            <option value="">All Categories</option>
            {cats.map(c=><option key={c}>{c}</option>)}
          </select>
          <button className="btn btn-gold" onClick={()=>{setShowForm(true);setEditId(null);}}>+ Add Item</button>
        </div>
      </div>

      <div className="stat-grid" style={{gridTemplateColumns:'repeat(3,1fr)'}}>
        <div className="stat-card gold"><div className="stat-label">Total Items</div><div className="stat-value">{inventory.length}</div></div>
        <div className="stat-card rose"><div className="stat-label">Low Stock</div><div className="stat-value">{inventory.filter(i=>i.qty<=i.minQty).length}</div></div>
        <div className="stat-card teal"><div className="stat-label">Total Value</div><div className="stat-value mono" style={{fontSize:'1.3rem'}}>{fmt(totalValue)}</div></div>
      </div>

      {showForm && (
        <div className="card" style={{marginBottom:20}}>
          <div className="section-header"><h2>{editId?'Edit Item':'Add Inventory Item'}</h2><button className="close-btn" onClick={()=>{setShowForm(false);setEditId(null);}}>×</button></div>
          <div className="form-grid">
            <div className="form-group"><label>Item Name *</label><input value={form.name} onChange={e=>setForm(p=>({...p,name:e.target.value}))}/></div>
            <div className="form-group"><label>Category</label>
              <select value={form.category} onChange={e=>setForm(p=>({...p,category:e.target.value}))}>
                {cats.map(c=><option key={c}>{c}</option>)}
              </select>
            </div>
            <div className="form-group"><label>Quantity</label><input type="number" value={form.qty} onChange={e=>setForm(p=>({...p,qty:e.target.value}))}/></div>
            <div className="form-group"><label>Min Quantity</label><input type="number" value={form.minQty} onChange={e=>setForm(p=>({...p,minQty:e.target.value}))}/></div>
            <div className="form-group"><label>Unit</label>
              <select value={form.unit} onChange={e=>setForm(p=>({...p,unit:e.target.value}))}>
                {['pcs','boxes','reams','sets','kits','kg','litres'].map(u=><option key={u}>{u}</option>)}
              </select>
            </div>
            <div className="form-group"><label>Unit Cost (KES)</label><input type="number" value={form.unitCost} onChange={e=>setForm(p=>({...p,unitCost:e.target.value}))}/></div>
            <div className="form-group"><label>Supplier</label><input value={form.supplier} onChange={e=>setForm(p=>({...p,supplier:e.target.value}))}/></div>
          </div>
          <div className="flex gap-8 mt-16">
            <button className="btn btn-gold" onClick={save}>{editId?'Update':'Add Item'}</button>
            <button className="btn btn-outline" onClick={()=>{setShowForm(false);setEditId(null);}}>Cancel</button>
          </div>
        </div>
      )}

      <div className="card">
        <div className="table-wrap">
          <table>
            <thead><tr><th>Item</th><th>Category</th><th>Quantity</th><th>Min Qty</th><th>Unit Cost</th><th>Total Value</th><th>Status</th><th>Actions</th></tr></thead>
            <tbody>
              {filtered.map(i=>{
                const low=i.qty<=i.minQty;
                return (
                  <tr key={i.id}>
                    <td><div className="fw6">{i.name}</div><div className="fc-text2 fs-sm">{i.supplier}</div></td>
                    <td><span className="badge badge-teal">{i.category}</span></td>
                    <td>
                      {adjustId===i.id
                        ? <div className="flex gap-8" style={{alignItems:'center'}}>
                            <input type="number" value={adjQty} onChange={e=>setAdjQty(e.target.value)} style={{width:70,padding:'4px 8px'}}/>
                            <button className="btn btn-green btn-sm" onClick={()=>adjustStock(i.id,1)}>+</button>
                            <button className="btn btn-rose btn-sm" onClick={()=>adjustStock(i.id,-1)}>−</button>
                            <button className="btn btn-outline btn-sm" onClick={()=>setAdjustId(null)}>✕</button>
                          </div>
                        : <span className={`mono fw6 ${low?'fc-rose':'fc-green'}`}>{i.qty} {i.unit}</span>
                      }
                    </td>
                    <td className="mono fc-text2">{i.minQty} {i.unit}</td>
                    <td className="mono">{fmt(i.unitCost)}</td>
                    <td className="mono fw6">{fmt(i.qty*i.unitCost)}</td>
                    <td><span className={`badge badge-${low?'rose':'green'}`}>{low?'⚠ Low':'✓ OK'}</span></td>
                    <td><div className="flex gap-8">
                      <button className="btn btn-gold btn-sm" onClick={()=>startEdit(i)}>Edit</button>
                      <button className="btn btn-teal btn-sm" onClick={()=>setAdjustId(i.id)}>Adjust</button>
                    </div></td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

// ──────────── ASSIGN TAB ────────────
function AssignTab({students,setStudents,routes,vehicles,showToast}){
  const [editingId,setEditingId]=useState(null);
  const [editForm,setEditForm]=useState({transportMode:'Walking',route:''});
  const [search,setSearch]=useState('');
  const [filterRoute,setFilterRoute]=useState('');

  const openEdit=(s)=>{ setEditingId(s.id); setEditForm({transportMode:s.transportMode,route:s.route||''}); };
  const saveEdit=()=>{
    setStudents(p=>p.map(s=>s.id===editingId?{...s,...editForm,transport:editForm.transportMode!=='Walking'}:s));
    setEditingId(null); showToast('Transport updated!');
  };

  const unassigned=students.filter(s=>s.transportMode==='Walking'||!s.route);
  const onTransport=students.filter(s=>s.transportMode!=='Walking');

  const filteredAll=students.filter(s=>{
    const q=search.toLowerCase();
    const mQ=s.name.toLowerCase().includes(q)||s.id.toLowerCase().includes(q);
    const mR=!filterRoute||(filterRoute==='Walking'?s.transportMode==='Walking':s.route===filterRoute);
    return mQ&&mR;
  });

  return(
    <div>
      <div className="section-header"><h2>Transport Assignment</h2></div>

      {/* Summary per route */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(180px,1fr))',gap:12,marginBottom:20}}>
        <div className="stat-card text2" style={{cursor:'pointer'}} onClick={()=>setFilterRoute('Walking')}>
          <div className="stat-label">🚶 Walking</div>
          <div className="stat-value">{students.filter(s=>s.transportMode==='Walking').length}</div>
          <div className="stat-sub">no transport needed</div>
        </div>
        {routes.map(r=>{
          const n=students.filter(s=>s.route===r.name&&s.transportMode!=='Walking').length;
          const cap=vehicles.filter(v=>v.route===r.name).reduce((a,v)=>a+v.capacity,0);
          const pct=cap?Math.round(n/cap*100):0;
          return(
            <div key={r.id} className={`stat-card ${pct>90?'rose':pct>70?'gold':'teal'}`} style={{cursor:'pointer'}} onClick={()=>setFilterRoute(r.name)}>
              <div className="stat-label">{r.name}</div>
              <div className="stat-value">{n}</div>
              <div className="stat-sub">{cap?`${pct}% of ${cap} seats`:'No vehicle assigned'}</div>
              {cap>0&&<div className="progress mt-8"><div className="progress-fill" style={{width:pct+'%',background:pct>90?'var(--rose)':pct>70?'var(--gold)':'var(--green)'}}></div></div>}
            </div>
          );
        })}
      </div>

      {/* Filter & search bar */}
      <div className="flex gap-8" style={{marginBottom:16,flexWrap:'wrap'}}>
        <input placeholder="Search student..." value={search} onChange={e=>setSearch(e.target.value)} style={{flex:1,minWidth:160}}/>
        <select value={filterRoute} onChange={e=>setFilterRoute(e.target.value)}>
          <option value="">All Students</option>
          <option value="Walking">🚶 Walking</option>
          {routes.map(r=><option key={r.id} value={r.name}>{r.name}</option>)}
        </select>
        {filterRoute&&<button className="btn btn-outline btn-sm" onClick={()=>setFilterRoute('')}>✕ Clear</button>}
      </div>

      {/* Student list with inline edit */}
      <div className="card">
        <div className="table-wrap desktop-only">
          <table>
            <thead>
              <tr><th>Student</th><th>Grade</th><th>Current Mode</th><th>Current Route</th><th>Vehicle</th><th>Edit Transport</th></tr>
            </thead>
            <tbody>
              {filteredAll.length===0&&<tr><td colSpan={6}><div className="empty"><div className="empty-icon">👨‍🎓</div>No students found</div></td></tr>}
              {filteredAll.map(s=>{
                const v=vehicles.find(vv=>vv.route===s.route);
                const isEditing=editingId===s.id;
                return(
                  <tr key={s.id} style={{background:isEditing?'rgba(240,165,0,0.06)':''}}>
                    <td className="fw6">{s.name}<div className="fc-text2 fs-sm">{s.parent}</div></td>
                    <td><span className={`badge badge-${LEVEL_COLOR[GRADE_LEVEL[s.grade]]||'teal'}`}>{s.grade}</span></td>
                    <td>
                      {isEditing?(
                        <div style={{display:'flex',gap:4}}>
                          {TRANSPORT_MODES.map(m=>(
                            <button key={m} className={`btn btn-sm ${editForm.transportMode===m?m==='Walking'?'btn-teal':m==='One-Way'?'btn-gold':'btn-green':'btn-outline'}`}
                              onClick={()=>setEditForm(p=>({...p,transportMode:m,route:m==='Walking'?'':p.route}))}>
                              {m==='Walking'?'🚶':m==='One-Way'?'➡️':'↔️'}
                            </button>
                          ))}
                        </div>
                      ):(
                        <span className={`badge badge-${s.transportMode==='Walking'?'text2':s.transportMode==='One-Way'?'gold':'green'}`}>
                          {s.transportMode==='Walking'?'🚶':s.transportMode==='One-Way'?'➡️':'↔️'} {s.transportMode}
                        </span>
                      )}
                    </td>
                    <td>
                      {isEditing&&editForm.transportMode!=='Walking'?(
                        <select value={editForm.route} onChange={e=>setEditForm(p=>({...p,route:e.target.value}))} style={{fontSize:'0.8rem',padding:'5px 8px'}}>
                          <option value="">Select route...</option>
                          {routes.map(r=><option key={r.id} value={r.name}>{r.name} — {r.description}</option>)}
                        </select>
                      ):(
                        <span className="fc-text2 fs-sm">{s.route||'—'}</span>
                      )}
                    </td>
                    <td className="mono fc-gold fs-sm">{v?.plate||'—'}</td>
                    <td>
                      {isEditing?(
                        <div className="flex gap-8">
                          <button className="btn btn-gold btn-sm" onClick={saveEdit}>💾 Save</button>
                          <button className="btn btn-outline btn-sm" onClick={()=>setEditingId(null)}>✕</button>
                        </div>
                      ):(
                        <button className="btn btn-outline btn-sm" onClick={()=>openEdit(s)}>✏️ Edit</button>
                      )}
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>

        {/* Mobile cards */}
        <div className="m-card-list">
          {filteredAll.map(s=>{
            const v=vehicles.find(vv=>vv.route===s.route);
            const isEditing=editingId===s.id;
            return(
              <div key={s.id} className="m-card-item" style={{border:isEditing?'1px solid var(--gold)':'1px solid var(--border)'}}>
                <div className="m-card-row">
                  <div><div className="fw7">{s.name}</div><div className="fc-text2 fs-sm">{LEVEL_ICON[GRADE_LEVEL[s.grade]]} {s.grade}</div></div>
                  {!isEditing&&<button className="btn btn-outline btn-sm" onClick={()=>openEdit(s)}>✏️ Edit</button>}
                </div>
                {isEditing?(
                  <div style={{display:'flex',flexDirection:'column',gap:10,padding:'10px 0'}}>
                    <div>
                      <label style={{fontSize:'0.7rem',color:'var(--text2)',textTransform:'uppercase',letterSpacing:'1px',fontWeight:700,display:'block',marginBottom:6}}>Transport Mode</label>
                      <div className="flex gap-8">
                        {TRANSPORT_MODES.map(m=>(
                          <button key={m} className={`btn btn-sm ${editForm.transportMode===m?m==='Walking'?'btn-teal':m==='One-Way'?'btn-gold':'btn-green':'btn-outline'}`}
                            onClick={()=>setEditForm(p=>({...p,transportMode:m,route:m==='Walking'?'':p.route}))} style={{flex:1,justifyContent:'center'}}>
                            {m==='Walking'?'🚶':m==='One-Way'?'➡️':'↔️'} {m}
                          </button>
                        ))}
                      </div>
                    </div>
                    {editForm.transportMode!=='Walking'&&(
                      <div className="form-group">
                        <label>Route</label>
                        <select value={editForm.route} onChange={e=>setEditForm(p=>({...p,route:e.target.value}))}>
                          <option value="">Select route...</option>
                          {routes.map(r=><option key={r.id} value={r.name}>{r.name} — {r.description}</option>)}
                        </select>
                      </div>
                    )}
                    <div className="flex gap-8">
                      <button className="btn btn-gold btn-sm btn-full" onClick={saveEdit}>💾 Save</button>
                      <button className="btn btn-outline btn-sm" onClick={()=>setEditingId(null)}>✕</button>
                    </div>
                  </div>
                ):(
                  <div className="m-card-row">
                    <span className={`badge badge-${s.transportMode==='Walking'?'text2':s.transportMode==='One-Way'?'gold':'green'}`}>
                      {s.transportMode==='Walking'?'🚶':s.transportMode==='One-Way'?'➡️':'↔️'} {s.transportMode}
                    </span>
                    <span className="fc-text2 fs-sm">{s.route?`🗺️ ${s.route}`:v?`🚌 ${v.plate}`:'No route'}</span>
                  </div>
                )}
              </div>
            );
          })}
        </div>
      </div>

      {/* Unassigned warning */}
      {unassigned.filter(s=>s.transportMode!=='Walking'&&!s.route).length>0&&(
        <div className="alert alert-rose" style={{marginTop:16}}>
          ⚠️ {unassigned.filter(s=>s.transportMode!=='Walking'&&!s.route).length} student(s) have transport mode set but no route assigned. Click ✏️ Edit to assign them.
        </div>
      )}
    </div>
  );
}

function Vehicles({vehicles,setVehicles,students,setStudents,showToast,routes,setRoutes}){

  const [showForm,setShowForm]=useState(false);
  const [editId,setEditId]=useState(null);
  const [viewId,setViewId]=useState(null);
  const [form,setForm]=useState({...BLANK_VEHICLE});
  const [showRouteForm,setShowRouteForm]=useState(false);
  const [editRouteId,setEditRouteId]=useState(null);
  const [routeForm,setRouteForm]=useState({name:'',description:'',morningTime:'6:30 AM',eveningTime:'4:30 PM',stops:''});

  const set = (k,v)=>setForm(p=>({...p,[k]:v}));

  const openEdit=(v)=>{ setForm({...v,capacity:String(v.capacity),fuelLevel:String(v.fuelLevel)}); setEditId(v.id); setShowForm(true); };

  const save=()=>{
    if(!form.plate||!form.driver){showToast('Plate & driver required','rose');return;}
    if(editId){
      setVehicles(p=>p.map(v=>v.id===editId?{...v,...form,capacity:parseInt(form.capacity),fuelLevel:parseInt(form.fuelLevel)}:v));
      showToast('Vehicle updated!');
    } else {
      setVehicles(p=>[...p,{id:'V'+uid(),...form,capacity:parseInt(form.capacity),fuelLevel:parseInt(form.fuelLevel),students:[]}]);
      showToast('Vehicle registered!');
    }
    setShowForm(false); setEditId(null);
  };

  const del=(id)=>{
    if(!confirm('Remove this vehicle?'))return;
    setVehicles(p=>p.filter(v=>v.id!==id));
    setViewId(null); showToast('Vehicle removed','rose');
  };

  const setStatus=(id,status)=>{ setVehicles(p=>p.map(v=>v.id===id?{...v,status}:v)); showToast('Status updated!'); };

  // Route CRUD
  const saveRoute=()=>{
    if(!routeForm.name){showToast('Route name required','rose');return;}
    if(editRouteId){
      setRoutes(p=>p.map(r=>r.id===editRouteId?{...r,...routeForm}:r));
      showToast('Route updated!');
    } else {
      setRoutes(p=>[...p,{id:'R'+uid(),...routeForm}]);
      showToast('Route added!');
    }
    setShowRouteForm(false); setEditRouteId(null);
    setRouteForm({name:'',description:'',morningTime:'6:30 AM',eveningTime:'4:30 PM',stops:''});
  };
  const delRoute=(id)=>{
    if(!confirm('Delete this route? Vehicles on this route will lose their assignment.'))return;
    setRoutes(p=>p.filter(r=>r.id!==id));
    showToast('Route deleted','rose');
  };
  const editRoute=(r)=>{ setRouteForm({...r}); setEditRouteId(r.id); setShowRouteForm(true); };

  const viewVehicle=vehicles.find(v=>v.id===viewId);
  const allRouteNames=routes.map(r=>r.name);

  // Stats
  const totalCap=vehicles.reduce((a,v)=>a+v.capacity,0);
  const assigned=students.filter(s=>s.transportMode==='One-Way'||s.transportMode==='Two-Way').length;
  const onMaint=vehicles.filter(v=>v.status==='maintenance').length;
  const expiringSoon=vehicles.filter(v=>{
    const d=v.insuranceExpiry;
    if(!d)return false;
    const diff=(new Date(d)-new Date())/(1000*60*60*24);
    return diff>=0&&diff<=30;
  }).length;

  return(
    <div>
      <div className="stat-grid" style={{gridTemplateColumns:'repeat(4,1fr)'}}>
        <div className="stat-card gold"><div className="stat-label">Total Vehicles</div><div className="stat-value">{vehicles.length}</div><div className="stat-sub">{vehicles.filter(v=>v.status==='active').length} active</div></div>
        <div className="stat-card teal"><div className="stat-label">Total Capacity</div><div className="stat-value">{totalCap}</div><div className="stat-sub">{assigned} students assigned</div></div>
        <div className="stat-card rose"><div className="stat-label">In Maintenance</div><div className="stat-value">{onMaint}</div><div className="stat-sub">vehicles grounded</div></div>
        <div className="stat-card purple"><div className="stat-label">Routes</div><div className="stat-value">{routes.length}</div><div className="stat-sub">active routes</div></div>
      </div>

      {expiringSoon>0&&<div className="alert alert-gold">⚠️ {expiringSoon} vehicle(s) have insurance expiring within 30 days. Check the fleet cards below.</div>}

      <div className="tabs">
        <div className={`tab ${tab==='fleet'?'active':''}`} onClick={()=>setTab('fleet')}>🚌 Fleet</div>
        <div className={`tab ${tab==='routes'?'active':''}`} onClick={()=>setTab('routes')}>🗺️ Routes</div>
        <div className={`tab ${tab==='students'?'active':''}`} onClick={()=>setTab('students')}>👨‍🎓 Students</div>
        <div className={`tab ${tab==='assign'?'active':''}`} onClick={()=>setTab('assign')}>📋 Assign</div>
      </div>

      {/* ── FLEET TAB ── */}
      {tab==='fleet'&&(
        <div>
          <div className="section-header">
            <h2>Vehicles ({vehicles.length})</h2>
            <button className="btn btn-gold" onClick={openAdd}>+ Add Vehicle</button>
          </div>

          {showForm&&(
            <div className="card" style={{marginBottom:20,border:'1px solid rgba(240,165,0,0.3)'}}>
              <div className="section-header">
                <h2 style={{color:'var(--gold)'}}>{editId?'Edit Vehicle':'Register Vehicle'}</h2>
                <button className="close-btn" onClick={()=>{setShowForm(false);setEditId(null);}}>×</button>
              </div>

              <div style={{fontSize:'0.68rem',textTransform:'uppercase',letterSpacing:'1.5px',color:'var(--text2)',fontWeight:700,marginBottom:10}}>🚌 Vehicle Details</div>
              <div className="form-grid" style={{marginBottom:16}}>
                <div className="form-group"><label>Number Plate *</label><input value={form.plate} onChange={e=>set('plate',e.target.value.toUpperCase())} placeholder="KDA 000A"/></div>
                <div className="form-group"><label>Make / Model</label><input value={form.make} onChange={e=>set('make',e.target.value)} placeholder="Toyota Coaster 30"/></div>
                <div className="form-group"><label>Year</label><input value={form.year} onChange={e=>set('year',e.target.value)} placeholder="2020"/></div>
                <div className="form-group"><label>Color</label><input value={form.color} onChange={e=>set('color',e.target.value)} placeholder="White"/></div>
                <div className="form-group"><label>Seating Capacity</label><input type="number" value={form.capacity} onChange={e=>set('capacity',e.target.value)}/></div>
                <div className="form-group"><label>Fuel Type</label>
                  <select value={form.fuelType} onChange={e=>set('fuelType',e.target.value)}>
                    <option>Diesel</option><option>Petrol</option><option>Electric</option><option>Hybrid</option>
                  </select>
                </div>
                <div className="form-group"><label>Fuel Level (%)</label><input type="number" min="0" max="100" value={form.fuelLevel} onChange={e=>set('fuelLevel',e.target.value)}/></div>
                <div className="form-group"><label>Status</label>
                  <select value={form.status} onChange={e=>set('status',e.target.value)}>
                    <option value="active">Active</option>
                    <option value="maintenance">Under Maintenance</option>
                    <option value="grounded">Grounded</option>
                  </select>
                </div>
              </div>

              <div style={{fontSize:'0.68rem',textTransform:'uppercase',letterSpacing:'1.5px',color:'var(--text2)',fontWeight:700,marginBottom:10}}>👤 Driver Details</div>
              <div className="form-grid" style={{marginBottom:16}}>
                <div className="form-group"><label>Driver Name *</label><input value={form.driver} onChange={e=>set('driver',e.target.value)}/></div>
                <div className="form-group"><label>Driver Phone</label><input value={form.driverPhone} onChange={e=>set('driverPhone',e.target.value)} placeholder="07XXXXXXXX"/></div>
                <div className="form-group"><label>License Number</label><input value={form.driverLicense} onChange={e=>set('driverLicense',e.target.value)} placeholder="DL/123456"/></div>
              </div>

              <div style={{fontSize:'0.68rem',textTransform:'uppercase',letterSpacing:'1.5px',color:'var(--text2)',fontWeight:700,marginBottom:10}}>🗺️ Route & Compliance</div>
              <div className="form-grid" style={{marginBottom:16}}>
                <div className="form-group"><label>Assigned Route</label>
                  <select value={form.route} onChange={e=>set('route',e.target.value)}>
                    <option value="">No Route</option>
                    {routes.map(r=><option key={r.id} value={r.name}>{r.name} — {r.description}</option>)}
                  </select>
                </div>
                <div className="form-group"><label>Insurance Expiry</label><input type="date" value={form.insuranceExpiry} onChange={e=>set('insuranceExpiry',e.target.value)}/></div>
                <div className="form-group"><label>Inspection Expiry</label><input type="date" value={form.inspectionExpiry} onChange={e=>set('inspectionExpiry',e.target.value)}/></div>
                <div className="form-group"><label>Notes</label><input value={form.notes} onChange={e=>set('notes',e.target.value)} placeholder="Any remarks..."/></div>
              </div>

              <div className="flex gap-8">
                <button className="btn btn-gold" onClick={save}>💾 {editId?'Update':'Register'} Vehicle</button>
                <button className="btn btn-outline" onClick={()=>{setShowForm(false);setEditId(null);}}>Cancel</button>
                {editId&&<button className="btn btn-rose" style={{marginLeft:'auto'}} onClick={()=>del(editId)}>🗑 Delete</button>}
              </div>
            </div>
          )}

          <div className="grid-3" style={{gap:16}}>
            {vehicles.length===0&&<div className="empty" style={{gridColumn:'1/-1'}}><div className="empty-icon">🚌</div>No vehicles registered yet</div>}
            {vehicles.map(v=>{
              const vStudents=students.filter(s=>(s.transportMode==='One-Way'||s.transportMode==='Two-Way')&&s.route===v.route);
              const fill=v.capacity?Math.round(vStudents.length/v.capacity*100):0;
              const insExpiring=v.insuranceExpiry&&(new Date(v.insuranceExpiry)-new Date())/(1000*60*60*24)<=30&&(new Date(v.insuranceExpiry)-new Date())/(1000*60*60*24)>=0;
              return(
                <div className="vehicle-card" key={v.id} style={{cursor:'pointer'}} onClick={()=>setViewId(v.id)}>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:10}}>
                    <div>
                      <div className="plate">{v.plate}</div>
                      <div className="fc-text2 fs-sm">{v.make}{v.year?` · ${v.year}`:''}{v.color?` · ${v.color}`:''}</div>
                    </div>
                    <span className={`badge badge-${v.status==='active'?'green':v.status==='maintenance'?'rose':'text2'}`}>{v.status}</span>
                  </div>
                  {insExpiring&&<div className="alert alert-gold" style={{padding:'5px 8px',fontSize:'0.7rem',marginBottom:8}}>⚠️ Insurance expires {fmtDate(v.insuranceExpiry)}</div>}
                  <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:6,marginBottom:10}}>
                    <div style={{background:'var(--navy3)',borderRadius:6,padding:'7px 9px'}}>
                      <div className="fc-text2" style={{fontSize:'0.62rem',textTransform:'uppercase',letterSpacing:'1px'}}>Route</div>
                      <div className="fw6 fs-sm">{v.route||'Unassigned'}</div>
                    </div>
                    <div style={{background:'var(--navy3)',borderRadius:6,padding:'7px 9px'}}>
                      <div className="fc-text2" style={{fontSize:'0.62rem',textTransform:'uppercase',letterSpacing:'1px'}}>Occupancy</div>
                      <div className="fw6 fs-sm">{vStudents.length}/{v.capacity} <span className="fc-text2">({fill}%)</span></div>
                    </div>
                  </div>
                  <div style={{marginBottom:8}}>
                    <div style={{display:'flex',justifyContent:'space-between',marginBottom:3}}>
                      <span className="fc-text2 fs-sm">⛽ Fuel</span>
                      <span className="mono fs-sm" style={{color:v.fuelLevel<30?'var(--rose)':v.fuelLevel<60?'var(--gold)':'var(--green)'}}>{v.fuelLevel}%</span>
                    </div>
                    <div className="progress"><div className="progress-fill" style={{width:v.fuelLevel+'%',background:v.fuelLevel<30?'var(--rose)':v.fuelLevel<60?'var(--gold)':'var(--green)'}}></div></div>
                  </div>
                  <div style={{marginBottom:8}}>
                    <div style={{display:'flex',justifyContent:'space-between',marginBottom:3}}>
                      <span className="fc-text2 fs-sm">👥 Capacity used</span>
                      <span className="mono fs-sm" style={{color:fill>90?'var(--rose)':fill>70?'var(--gold)':'var(--green)'}}>{fill}%</span>
                    </div>
                    <div className="progress"><div className="progress-fill" style={{width:fill+'%',background:fill>90?'var(--rose)':fill>70?'var(--gold)':'var(--green)'}}></div></div>
                  </div>
                  <div className="fc-text2 fs-sm" style={{marginBottom:10}}>👤 {v.driver} · {v.driverPhone}</div>
                  <div className="flex gap-8" onClick={e=>e.stopPropagation()}>
                    <button className="btn btn-gold btn-sm" onClick={()=>openEdit(v)}>✏️ Edit</button>
                    {v.status!=='active'&&<button className="btn btn-green btn-sm" onClick={()=>setStatus(v.id,'active')}>✓ Activate</button>}
                    {v.status==='active'&&<button className="btn btn-rose btn-sm" onClick={()=>setStatus(v.id,'maintenance')}>🔧 Maint.</button>}
                  </div>
                </div>
              );
            })}
          </div>

          {/* Vehicle detail modal */}
          {viewVehicle&&(
            <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&setViewId(null)}>
              <div className="modal">
                <div className="modal-handle"/>
                <div className="modal-header">
                  <h2>🚌 {viewVehicle.plate}</h2>
                  <button className="close-btn" onClick={()=>setViewId(null)}>×</button>
                </div>
                <div className="modal-body">
                  <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:14}}>
                    {[
                      {l:'Make/Model',v:viewVehicle.make||'—'},
                      {l:'Year',v:viewVehicle.year||'—'},
                      {l:'Color',v:viewVehicle.color||'—'},
                      {l:'Fuel Type',v:viewVehicle.fuelType||'—'},
                      {l:'Capacity',v:viewVehicle.capacity+' seats'},
                      {l:'Route',v:viewVehicle.route||'Unassigned'},
                      {l:'Driver',v:viewVehicle.driver},
                      {l:'Driver Phone',v:viewVehicle.driverPhone||'—'},
                      {l:'License No.',v:viewVehicle.driverLicense||'—'},
                      {l:'Insurance Exp.',v:viewVehicle.insuranceExpiry?fmtDate(viewVehicle.insuranceExpiry):'—'},
                      {l:'Inspection Exp.',v:viewVehicle.inspectionExpiry?fmtDate(viewVehicle.inspectionExpiry):'—'},
                      {l:'Status',v:viewVehicle.status},
                    ].map((r,i)=>(
                      <div key={i} style={{background:'var(--navy3)',borderRadius:8,padding:'9px 12px'}}>
                        <div style={{fontSize:'0.65rem',color:'var(--text2)',textTransform:'uppercase',letterSpacing:'1px',fontWeight:700}}>{r.l}</div>
                        <div className="fw6 fs-sm" style={{marginTop:3}}>{r.v}</div>
                      </div>
                    ))}
                  </div>
                  {viewVehicle.notes&&<div className="alert alert-teal" style={{fontSize:'0.8rem'}}>📝 {viewVehicle.notes}</div>}
                  <div style={{marginTop:12}}>
                    <div style={{fontSize:'0.68rem',color:'var(--text2)',textTransform:'uppercase',letterSpacing:'1px',fontWeight:700,marginBottom:8}}>Students on this vehicle</div>
                    {students.filter(s=>(s.transportMode==='One-Way'||s.transportMode==='Two-Way')&&s.route===viewVehicle.route).map(s=>(
                      <div key={s.id} style={{display:'flex',justifyContent:'space-between',padding:'6px 0',borderBottom:'1px solid var(--border)',fontSize:'0.82rem'}}>
                        <span className="fw6">{s.name}</span>
                        <div style={{display:'flex',gap:6}}>
                          <span className={`badge badge-${LEVEL_COLOR[GRADE_LEVEL[s.grade]]||'teal'}`} style={{fontSize:'0.6rem'}}>{s.grade}</span>
                          <span className={`badge badge-${s.transportMode==='Two-Way'?'green':'gold'}`} style={{fontSize:'0.6rem'}}>{s.transportMode}</span>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
                <div className="modal-footer">
                  <button className="btn btn-outline" onClick={()=>setViewId(null)}>Close</button>
                  <button className="btn btn-gold" onClick={()=>{openEdit(viewVehicle);setViewId(null);}}>✏️ Edit</button>
                  <button className="btn btn-rose" onClick={()=>del(viewVehicle.id)}>🗑 Delete</button>
                </div>
              </div>
            </div>
          )}
        </div>
      )}

      {/* ── ROUTES TAB ── */}
      {tab==='routes'&&(
        <div>
          <div className="section-header">
            <h2>Routes ({routes.length})</h2>
            <button className="btn btn-gold" onClick={()=>{setRouteForm({name:'',description:'',morningTime:'6:30 AM',eveningTime:'4:30 PM',stops:''});setEditRouteId(null);setShowRouteForm(true);}}>+ Add Route</button>
          </div>

          {showRouteForm&&(
            <div className="card" style={{marginBottom:20,border:'1px solid rgba(240,165,0,0.3)'}}>
              <div className="section-header">
                <h2 style={{color:'var(--gold)'}}>{editRouteId?'Edit Route':'New Route'}</h2>
                <button className="close-btn" onClick={()=>setShowRouteForm(false)}>×</button>
              </div>
              <div className="form-grid" style={{marginBottom:14}}>
                <div className="form-group"><label>Route Name *</label><input value={routeForm.name} onChange={e=>setRouteForm(p=>({...p,name:e.target.value}))} placeholder="Route A"/></div>
                <div className="form-group"><label>Description</label><input value={routeForm.description} onChange={e=>setRouteForm(p=>({...p,description:e.target.value}))} placeholder="Area / road served"/></div>
                <div className="form-group"><label>Morning Pickup Time</label><input value={routeForm.morningTime} onChange={e=>setRouteForm(p=>({...p,morningTime:e.target.value}))} placeholder="6:30 AM"/></div>
                <div className="form-group"><label>Evening Drop-off Time</label><input value={routeForm.eveningTime} onChange={e=>setRouteForm(p=>({...p,eveningTime:e.target.value}))} placeholder="4:30 PM"/></div>
                <div className="form-group" style={{gridColumn:'1/-1'}}><label>Stops (comma-separated)</label><input value={routeForm.stops} onChange={e=>setRouteForm(p=>({...p,stops:e.target.value}))} placeholder="Stage 1, Stage 2, Stage 3, School"/></div>
              </div>
              <div className="flex gap-8">
                <button className="btn btn-gold" onClick={saveRoute}>💾 {editRouteId?'Update':'Add'} Route</button>
                <button className="btn btn-outline" onClick={()=>setShowRouteForm(false)}>Cancel</button>
              </div>
            </div>
          )}

          <div className="grid-2" style={{gap:16}}>
            {routes.length===0&&<div className="empty" style={{gridColumn:'1/-1'}}><div className="empty-icon">🗺️</div>No routes defined yet</div>}
            {routes.map(r=>{
              const routeVehicles=vehicles.filter(v=>v.route===r.name);
              const routeStudents=students.filter(s=>(s.transportMode==='One-Way'||s.transportMode==='Two-Way')&&s.route===r.name);
              const stops=r.stops?r.stops.split(',').map(s=>s.trim()).filter(Boolean):[];
              return(
                <div className="card" key={r.id}>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:12}}>
                    <div>
                      <div style={{fontFamily:'DM Serif Display',fontSize:'1.1rem',color:'var(--gold)'}}>{r.name}</div>
                      <div className="fc-text2 fs-sm">{r.description}</div>
                    </div>
                    <div className="flex gap-8">
                      <button className="btn btn-gold btn-sm" onClick={()=>editRoute(r)}>✏️</button>
                      <button className="btn btn-rose btn-sm" onClick={()=>delRoute(r.id)}>🗑</button>
                    </div>
                  </div>
                  <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8,marginBottom:12}}>
                    <div style={{background:'var(--navy3)',borderRadius:7,padding:'8px 10px',textAlign:'center'}}>
                      <div className="fc-text2" style={{fontSize:'0.62rem',textTransform:'uppercase',letterSpacing:'1px'}}>Vehicles</div>
                      <div className="fw7" style={{fontSize:'1.1rem',color:'var(--teal)'}}>{routeVehicles.length}</div>
                    </div>
                    <div style={{background:'var(--navy3)',borderRadius:7,padding:'8px 10px',textAlign:'center'}}>
                      <div className="fc-text2" style={{fontSize:'0.62rem',textTransform:'uppercase',letterSpacing:'1px'}}>Students</div>
                      <div className="fw7" style={{fontSize:'1.1rem',color:'var(--gold)'}}>{routeStudents.length}</div>
                    </div>
                    <div style={{background:'var(--navy3)',borderRadius:7,padding:'8px 10px',textAlign:'center'}}>
                      <div className="fc-text2" style={{fontSize:'0.62rem',textTransform:'uppercase',letterSpacing:'1px'}}>Stops</div>
                      <div className="fw7" style={{fontSize:'1.1rem',color:'var(--green)'}}>{stops.length}</div>
                    </div>
                  </div>
                  <div style={{display:'flex',gap:12,marginBottom:10,fontSize:'0.8rem'}}>
                    <span>🌅 <strong>Morning:</strong> {r.morningTime}</span>
                    <span>🌆 <strong>Evening:</strong> {r.eveningTime}</span>
                  </div>
                  {stops.length>0&&(
                    <div>
                      <div className="fc-text2 fs-sm" style={{marginBottom:6,fontWeight:700}}>Stops:</div>
                      <div style={{display:'flex',flexWrap:'wrap',gap:5}}>
                        {stops.map((s,i)=>(
                          <span key={i} style={{background:'var(--navy3)',borderRadius:99,padding:'3px 9px',fontSize:'0.7rem',display:'flex',alignItems:'center',gap:4}}>
                            <span style={{color:'var(--text2)',fontSize:'0.6rem'}}>{i+1}.</span> {s}
                          </span>
                        ))}
                      </div>
                    </div>
                  )}
                  {routeVehicles.length>0&&(
                    <div style={{marginTop:10,paddingTop:10,borderTop:'1px solid var(--border)'}}>
                      <div className="fc-text2 fs-sm" style={{fontWeight:700,marginBottom:5}}>Assigned vehicle(s):</div>
                      {routeVehicles.map(v=>(
                        <span key={v.id} className="mono" style={{fontSize:'0.78rem',color:'var(--gold)',marginRight:8}}>🚌 {v.plate}</span>
                      ))}
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        </div>
      )}

      {/* ── STUDENTS TAB ── */}
      {tab==='students'&&(
        <div>
          <div className="section-header"><h2>Transport Students</h2></div>
          <div className="stat-grid" style={{gridTemplateColumns:'repeat(3,1fr)'}}>
            <div className="stat-card green"><div className="stat-label">Two-Way</div><div className="stat-value">{students.filter(s=>s.transportMode==='Two-Way').length}</div><div className="stat-sub">both directions</div></div>
            <div className="stat-card gold"><div className="stat-label">One-Way</div><div className="stat-value">{students.filter(s=>s.transportMode==='One-Way').length}</div><div className="stat-sub">one direction</div></div>
            <div className="stat-card text2"><div className="stat-label">Walking</div><div className="stat-value">{students.filter(s=>s.transportMode==='Walking').length}</div><div className="stat-sub">no transport</div></div>
          </div>
          <div className="card">
            <div className="table-wrap desktop-only">
              <table>
                <thead><tr><th>Student</th><th>Grade</th><th>Level</th><th>Mode</th><th>Route</th><th>Vehicle</th><th>Driver</th></tr></thead>
                <tbody>
                  {students.filter(s=>s.transportMode==='One-Way'||s.transportMode==='Two-Way').length===0
                    ? <tr><td colSpan={7}><div className="empty"><div className="empty-icon">🚌</div>No students using transport</div></td></tr>
                    : students.filter(s=>s.transportMode==='One-Way'||s.transportMode==='Two-Way').map(s=>{
                        const v=vehicles.find(vv=>vv.route===s.route);
                        return(
                          <tr key={s.id}>
                            <td className="fw6">{s.name}</td>
                            <td><span className={`badge badge-${LEVEL_COLOR[GRADE_LEVEL[s.grade]]||'teal'}`}>{s.grade}</span></td>
                            <td className="fc-text2 fs-sm">{LEVEL_ICON[GRADE_LEVEL[s.grade]]} {GRADE_LEVEL[s.grade]}</td>
                            <td><span className={`badge badge-${s.transportMode==='Two-Way'?'green':'gold'}`}>{s.transportMode==='Two-Way'?'↔️':'➡️'} {s.transportMode}</span></td>

function Fueling({fueling,setFueling,vehicles,setVehicles,showToast}){
  const [showForm,setShowForm]=useState(false);
  const [form,setForm]=useState({vehicleId:'',date:today(),liters:'',costPerLiter:'182',total:'',station:'',odometer:'',attendant:''});

  const handleLitersChange=(l)=>{
    const t=(parseFloat(l)||0)*(parseFloat(form.costPerLiter)||0);
    setForm(p=>({...p,liters:l,total:t.toString()}));
  };

  const handleCostChange=(c)=>{
    const t=(parseFloat(form.liters)||0)*(parseFloat(c)||0);
    setForm(p=>({...p,costPerLiter:c,total:t.toString()}));
  };

  const save=()=>{
    if(!form.vehicleId||!form.liters){showToast('Vehicle & liters required','rose');return;}
    setFueling(p=>[...p,{id:'FL'+uid(),...form,liters:parseFloat(form.liters),costPerLiter:parseFloat(form.costPerLiter),total:parseFloat(form.total),odometer:parseFloat(form.odometer)}]);
    // Update fuel level
    const v=vehicles.find(vv=>vv.id===form.vehicleId);
    if(v){
      const newLevel=Math.min(100,v.fuelLevel+Math.round(parseFloat(form.liters)/v.capacity*10));
      setVehicles(p=>p.map(vv=>vv.id===form.vehicleId?{...vv,fuelLevel:Math.min(100,newLevel)}:vv));

    setShowForm(false);showToast('Fueling recorded!');

    <div>

        <div className="card" style={{marginBottom:20}}>

          <div className="form-grid">

              <select value={form.vehicleId} onChange={e=>setForm(p=>({...p,vehicleId:e.target.value}))}>

            </div>
            <div className="form-group"><label>Date</label><input type="date" value={form.date} onChange={e=>setForm(p=>({...p,date:e.target.value}))}/></div>
            <div className="form-group"><label>Liters *</label><input type="number" value={form.liters} onChange={e=>handleLitersChange(e.target.value)}/></div>
            <div className="form-group"><label>Cost/Liter (KES)</label><input type="number" value={form.costPerLiter} onChange={e=>handleCostChange(e.target.value)}/></div>
            <div className="form-group"><label>Total Cost (KES)</label><input type="number" value={form.total} onChange={e=>setForm(p=>({...p,total:e.target.value}))} readOnly style={{background:'var(--navy3)'}}/></div>

// ── Africa's Talking via proxy ──
// PROXY is resolved at call-time from atConfig.proxyUrl or window.location.origin
function getProxy(config){ return (config&&config.proxyUrl&&config.proxyUrl.trim())||window.location.origin; }

async function checkProxy(url){
  try{
    const r=await fetch(`${url||window.location.origin}/api/ping`,{method:'GET'});
    const d=await r.json();
    window._proxyReachable=d.ok===true;
  }catch{
    window._proxyReachable=false;
  }
}
checkProxy();

async function sendATSms(phones,message,config){
  const PROXY=getProxy(config);
  const results=[];
  for(const phone of phones){
    if(config.sandbox&&!window._proxyReachable){
      await new Promise(r=>setTimeout(r,100));
      results.push({phone,status:'Simulated (proxy offline)',messageId:'SIM'+Math.random().toString(36).slice(2,8).toUpperCase(),cost:'—'});
      continue;
    }
    try{
      const resp=await fetch(`${PROXY}/api/sms`,{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({apiKey:config.apiKey,username:config.username,to:phone,message,from:config.shortCode||''})
      });
      const data=await resp.json();
      const r=data?.SMSMessageData?.Recipients?.[0];
      if(r){
        results.push({phone,status:r.status,messageId:r.messageId,cost:r.cost});
      } else {
        results.push({phone,status:data.error||data.raw||'Unknown response',messageId:'—',cost:'—'});
      }
    }catch(e){
      results.push({phone,status:'Proxy unreachable — check proxy URL in AT Settings',messageId:'—',cost:'—'});
    }
  }
  return results;
}

async function sendATWhatsApp(phones,message,config){
  const PROXY=getProxy(config);
  const results=[];
  for(const phone of phones){
    if(config.sandbox&&!window._proxyReachable){
      await new Promise(r=>setTimeout(r,120));
      results.push({phone,status:'Simulated (proxy offline)',messageId:'WAS'+Math.random().toString(36).slice(2,8).toUpperCase(),cost:'—'});
      continue;
    }
    try{
      const resp=await fetch(`${PROXY}/api/whatsapp`,{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({apiKey:config.apiKey,username:config.username,to:phone,message,from:config.whatsappFrom||''})
      });
      const data=await resp.json();
      results.push({phone,status:data?.status||data?.SMSMessageData?.Recipients?.[0]?.status||'Sent',messageId:data?.messageId||'—',cost:'—'});
    }catch(e){
      results.push({phone,status:'Proxy unreachable — check proxy URL in AT Settings',messageId:'—',cost:'—'});
    }
  }
  return results;
}
function normalizePhone(raw){
  if(!raw) return null;
  const d=raw.replace(/\D/g,'');
  if(d.startsWith('254')&&d.length===12) return '+'+d;
  if(d.startsWith('0')&&d.length===10) return '+254'+d.slice(1);
  if(d.length===9) return '+254'+d;
  return '+'+d;
}


function Messaging({students,messages,setMessages,showToast,fees,atConfig,setPage}){
  const [tab,setTab]=useState('compose');
  const [channel,setChannel]=useState('sms'); // 'sms' | 'whatsapp' | 'both'
  const [form,setForm]=useState({recipients:'all',gradeFilter:'',selectedIds:[],subject:'',body:'',type:'general'});
  const [aiPrompt,setAiPrompt]=useState('');
  const [aiLoading,setAiLoading]=useState(false);
  const [preview,setPreview]=useState(null);
  const [sending,setSending]=useState(false);
  const [sendLog,setSendLog]=useState([]);
  const [progress,setProgress]=useState(0);
  const [sendDone,setSendDone]=useState(false);

  const configured = atConfig.apiKey||atConfig.sandbox;

  const getRecipients=()=>{
    if(form.recipients==='all') return students;
    if(form.recipients==='grade') return students.filter(s=>s.grade===form.gradeFilter);
    if(form.recipients==='transport') return students.filter(s=>s.transportMode==='One-Way'||s.transportMode==='Two-Way');
    if(form.recipients==='debtors') return students.filter(s=>{
      const f=fees.find(ff=>ff.studentId===s.id);
      return f&&f.paid<f.amount;
    });
    if(form.recipients==='selected') return students.filter(s=>form.selectedIds.includes(s.id));
    return students;
  };

  const recipients=getRecipients();

  const personalise=(text,student)=>{
    const feeRec=fees.find(f=>f.studentId===student.id);
    const balance=feeRec?feeRec.amount-feeRec.paid:0;
    return text
      .replace(/{parent}/g,student.parent)
      .replace(/{student}/g,student.name)
      .replace(/{grade}/g,student.grade)
      .replace(/{term}/g,'Term 1 2025')
      .replace(/{balance}/g,'KES '+balance.toLocaleString());
  };

  const applyTemplate=(tpl)=>{setForm(p=>({...p,subject:tpl.subject,body:tpl.body,type:tpl.type}));};

  const generateWithAI=async()=>{
    if(!aiPrompt.trim()){showToast('Enter a prompt first','rose');return;}
    setAiLoading(true);
    try{
      const res=await fetch('https://api.anthropic.com/v1/messages',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({
          model:'claude-sonnet-4-20250514',
          max_tokens:1000,
          system:`You write professional, warm school-to-parent SMS/WhatsApp messages for Tumaini Valley Springs Academy in Kenya. Keep messages concise (under 160 chars for SMS) but complete. Respond ONLY as JSON: {"subject":"...","body":"...","type":"general"}. Types: fees,general,reopening,academic,transport,event. Use placeholders: {parent},{student},{grade},{term},{balance}.`,
          messages:[{role:'user',content:aiPrompt}]
        })
      });
      const data=await res.json();
      const text=data.content.find(c=>c.type==='text')?.text||'{}';
      const parsed=JSON.parse(text.replace(/```json|```/g,'').trim());
      setForm(p=>({...p,subject:parsed.subject||p.subject,body:parsed.body||p.body,type:parsed.type||p.type}));
      showToast('AI message generated!');
    }catch(e){showToast('AI generation failed','rose');}
    setAiLoading(false);
  };

  const sendMessages=async()=>{
    if(!form.body){showToast('Message body is required','rose');return;}
    if(recipients.length===0){showToast('No recipients selected','rose');return;}
    if(!atConfig.apiKey&&!atConfig.sandbox){showToast('Configure Africa\'s Talking credentials first','rose');setPage('settings');return;}
    setSending(true);setSendLog([]);setProgress(0);setSendDone(false);
    const log=[];

    for(let i=0;i<recipients.length;i++){
      const s=recipients[i];
      const phone=normalizePhone(s.phone);
      const msg=personalise(form.body,s);
      const entry={name:s.name,parent:s.parent,phone:phone||s.phone,grade:s.grade,smsStatus:'—',waStatus:'—',messageId:'—',cost:'—'};

      if((channel==='sms'||channel==='both')&&phone){
        const [r]=await sendATSms([phone],msg,atConfig);
        entry.smsStatus=r.status;
        entry.messageId=r.messageId;
        entry.cost=r.cost;
      }
      if((channel==='whatsapp'||channel==='both')&&phone&&(atConfig.whatsappEnabled||atConfig.sandbox)){
        const [r]=await sendATWhatsApp([phone],msg,atConfig);
        entry.waStatus=r.status;
      }
      if(!phone) entry.smsStatus='Invalid phone';

      log.push(entry);
      setSendLog([...log]);
      setProgress(Math.round((i+1)/recipients.length*100));
    }

    const successCount=log.filter(l=>l.smsStatus==='Success'||l.waStatus==='Success').length;
    const msgRecord={
      id:'MSG'+Date.now(),
      date:new Date().toISOString().split('T')[0],
      subject:form.subject||'(No subject)',
      body:form.body,
      recipients:form.recipients,
      recipientCount:recipients.length,
      successCount,
      type:form.type||'general',
      channel,
      sentBy:'Admin',
      status:'sent',
      sandbox:atConfig.sandbox,
      log:[...log]
    };
    setMessages(p=>[msgRecord,...p]);
    setSending(false);setSendDone(true);
    showToast(`✅ Dispatched to ${successCount}/${recipients.length} parents via ${channel.toUpperCase()}!`,'gold');
  };

  const toggleStudent=(id)=>{
    setForm(p=>({...p,selectedIds:p.selectedIds.includes(id)?p.selectedIds.filter(x=>x!==id):[...p.selectedIds,id]}));
  };

  const typeColor={fees:'rose',general:'teal',reopening:'green',academic:'purple',transport:'gold',event:'teal'};
  const channelIcon={sms:'📱',whatsapp:'💬',both:'📱💬'};

  return(
    <div>
      {/* Config banner */}
      {!atConfig.apiKey&&!atConfig.sandbox&&(
        <div className="alert alert-rose" style={{marginBottom:16}}>
          ⚠️ Africa's Talking credentials not configured. <button className="btn btn-rose btn-sm" style={{marginLeft:8}} onClick={()=>setPage('settings')}>Configure Now →</button>
        </div>
      )}

// ──────────── DIAGNOSTICS ────────────
function Diagnostics({students,fees,inventory,vehicles,exams,messages,atConfig,syncConfig,syncStatus,routes,showToast}){
  const [running,  setRunning]  = useState(false);
  const [results,  setResults]  = useState(null);
  const [proxyRes, setProxyRes] = useState(null);
  const [mongoRes, setMongoRes] = useState(null);

  const runDiagnostics = async() => {
    setRunning(true); setResults(null); setProxyRes(null); setMongoRes(null);
    const checks = [];

    // ── 1. LocalStorage ──
    try{
      const key='__diag_test__'; localStorage.setItem(key,'1'); localStorage.removeItem(key);
      checks.push({id:'ls',label:'Local Storage',status:'pass',msg:'Read/write working'});
    }catch(e){ checks.push({id:'ls',label:'Local Storage',status:'fail',msg:e.message}); }

    // ── 2. Data integrity ──
    const studentsOk  = Array.isArray(students)&&students.every(s=>s.id&&s.name&&s.grade);
    checks.push({id:'students',label:'Student Records',status:studentsOk?'pass':'warn',
      msg:studentsOk?`${students.length} records, all valid`:`${students.filter(s=>!s.id||!s.name||!s.grade).length} records missing required fields`});

    const feesOk = Array.isArray(fees)&&fees.every(f=>f.studentId&&f.term&&f.year);
    checks.push({id:'fees',label:'Fee Records',status:feesOk?'pass':'warn',
      msg:feesOk?`${fees.length} records valid`:'Some fee records missing fields'});

    const examsOk = Array.isArray(exams)&&exams.every(e=>e.studentId&&e.grade&&Array.isArray(e.subjects));
    checks.push({id:'exams',label:'Exam Records',status:examsOk?'pass':'warn',
      msg:examsOk?`${exams.length} records valid`:'Some exam records missing fields'});

    // Orphan check — exams with no matching student
    const studentIds = new Set(students.map(s=>s.id));
    const orphanExams = exams.filter(e=>!studentIds.has(e.studentId));
    checks.push({id:'orphan_exams',label:'Orphaned Exam Records',status:orphanExams.length?'warn':'pass',
      msg:orphanExams.length?`${orphanExams.length} exam record(s) have no matching student`:'All exam records linked to valid students'});

    const orphanFees = fees.filter(f=>!studentIds.has(f.studentId));
    checks.push({id:'orphan_fees',label:'Orphaned Fee Records',status:orphanFees.length?'warn':'pass',
      msg:orphanFees.length?`${orphanFees.length} fee record(s) have no matching student`:'All fee records linked to valid students'});

    // ── 3. Inventory ──
    const lowStock = inventory.filter(i=>i.qty<=i.minQty);
    checks.push({id:'inventory',label:'Inventory Low Stock',status:lowStock.length?'warn':'pass',
      msg:lowStock.length?`${lowStock.length} item(s) at or below minimum: ${lowStock.map(i=>i.name).join(', ')}`:'All items adequately stocked'});

    // ── 4. Vehicles ──
    const expiredInsurance = vehicles.filter(v=>v.insurance&&new Date(v.insurance)<new Date());
    const expiredInspection = vehicles.filter(v=>v.inspection&&new Date(v.inspection)<new Date());
    checks.push({id:'vehicle_docs',label:'Vehicle Documents',status:(expiredInsurance.length||expiredInspection.length)?'warn':'pass',
      msg:(expiredInsurance.length||expiredInspection.length)
        ?`${expiredInsurance.length} expired insurance, ${expiredInspection.length} expired inspection`
        :'All vehicle documents current'});

    // ── 5. Unassigned transport students ──
    const transportStudents = students.filter(s=>s.transportMode!=='Walking');
    const assignedStudents  = students.filter(s=>s.busRoute||s.vehicle);
    const unassigned = transportStudents.filter(s=>!routes.some(r=>r.id===s.route));
    checks.push({id:'transport',label:'Transport Assignments',status:unassigned.length?'warn':'pass',
      msg:unassigned.length?`${unassigned.length} transport student(s) not assigned to a route`:`${transportStudents.length} transport students assigned`});

    // ── 6. AT Config ──
    const atOk = atConfig.apiKey&&atConfig.username;
    checks.push({id:'at_config',label:"Africa's Talking Config",status:atOk?'pass':'warn',
      msg:atOk?`Configured (${atConfig.sandbox?'Sandbox':'Live'} mode)`:'API key not configured — SMS will not work'});

    // ── 7. Cloud sync config ──
    const syncOk = syncConfig.proxyUrl&&syncConfig.syncSecret;
    checks.push({id:'sync_config',label:'Cloud Sync Config',status:syncOk?'pass':'warn',
      msg:syncOk?`Proxy URL and secret configured`:'Sync not configured — data only saved locally'});

    checks.push({id:'sync_status',label:'Cloud Sync Status',
      status:syncStatus==='ok'?'pass':syncStatus==='error'?'fail':syncStatus==='syncing'?'info':'warn',
      msg:syncStatus==='ok'?'Last sync successful':syncStatus==='error'?'Last sync failed — check your Render URL and secret':syncStatus==='syncing'?'Sync in progress…':'Not synced yet this session'});

    // ── 8. Browser capabilities ──
    const hasIndexedDB  = !!window.indexedDB;
    const hasServiceWorker = 'serviceWorker' in navigator;
    const lsSize = Object.keys(localStorage).filter(k=>k.startsWith('edutrack')).reduce((t,k)=>{
      try{return t+localStorage.getItem(k).length;}catch{return t;}
    },0);
    checks.push({id:'browser',label:'Browser Storage Used',status:'info',
      msg:`≈${(lsSize/1024).toFixed(1)} KB used in localStorage`});

    // ── 9. Data completeness ──
    const studentsNoPhone  = students.filter(s=>!s.phone);
    const studentsNoDOB    = students.filter(s=>!s.dob);
    const studentsNoParent = students.filter(s=>!s.parent||s.parent==='(Unknown)');
    if(studentsNoPhone.length||studentsNoDOB.length||studentsNoParent.length){
      checks.push({id:'data_quality',label:'Student Data Completeness',status:'warn',
        msg:`${studentsNoParent.length} missing parent name, ${studentsNoPhone.length} missing phone, ${studentsNoDOB.length} missing date of birth`});
    } else {
      checks.push({id:'data_quality',label:'Student Data Completeness',status:'pass',msg:'All student records complete'});
    }

    // ── 10. Proxy ping (async) ──
    setResults(checks);

    // ping proxy separately
    const proxyUrl = (syncConfig.proxyUrl||'').trim()||window.location.origin;
    try{
      const t0=Date.now();
      const r=await fetch(`${proxyUrl}/api/ping`,{signal:AbortSignal.timeout(5000)});
      const d=await r.json();
      const ms=Date.now()-t0;
      setProxyRes({status:d.ok?'pass':'fail',msg:d.ok?`Online · ${ms}ms response · Sync: ${d.sync}`:'Ping returned unexpected response',url:proxyUrl,sync:d.sync});
      if(d.sync==='mongodb') setMongoRes({status:'pass',msg:'MongoDB Atlas connected and responding'});
      else setMongoRes({status:'warn',msg:'Server online but MongoDB not connected. Check MONGODB_URI on Render.'});
    }catch(e){
      setProxyRes({status:'fail',msg:`Unreachable — ${e.message.slice(0,60)}`,url:proxyUrl});
      setMongoRes({status:'warn',msg:'Cannot verify — server is offline'});
    }

    setRunning(false);
  };

  React.useEffect(()=>{ runDiagnostics(); },[]);

  const statusIcon  = s => s==='pass'?'✅':s==='fail'?'❌':s==='warn'?'⚠️':'ℹ️';
  const statusColor = s => s==='pass'?'var(--green)':s==='fail'?'var(--rose)':s==='warn'?'var(--gold)':'var(--teal)';
  const statusBg    = s => s==='pass'?'rgba(34,197,94,0.07)':s==='fail'?'rgba(239,68,68,0.07)':s==='warn'?'rgba(234,179,8,0.07)':'rgba(14,116,144,0.07)';
  const statusBorder= s => s==='pass'?'rgba(34,197,94,0.2)':s==='fail'?'rgba(239,68,68,0.2)':s==='warn'?'rgba(234,179,8,0.2)':'rgba(14,116,144,0.2)';

  const allChecks = [
    ...(results||[]),
    ...(proxyRes?[{id:'proxy',label:'Proxy Server',status:proxyRes.status,msg:proxyRes.msg+(proxyRes.url?` (${proxyRes.url})`:''),link:proxyRes.url?`${proxyRes.url}/api/ping`:null}]:[]),
    ...(mongoRes?[{id:'mongo',label:'MongoDB Atlas',status:mongoRes.status,msg:mongoRes.msg}]:[]),
  ];

  const pass = allChecks.filter(c=>c.status==='pass').length;
  const warn = allChecks.filter(c=>c.status==='warn').length;
  const fail = allChecks.filter(c=>c.status==='fail').length;
  const total = allChecks.length;

  const overallStatus = fail>0?'fail':warn>0?'warn':'pass';

  return(
    <div>
      {/* Header */}
      <div style={{background:'var(--navy3)',borderRadius:12,padding:'18px 20px',marginBottom:18,border:'1px solid var(--border)',display:'flex',alignItems:'center',gap:14}}>
        <div style={{fontSize:'2.5rem'}}>🩺</div>
        <div style={{flex:1}}>
          <div style={{fontWeight:800,fontSize:'1.05rem'}}>System Diagnostics</div>
          <div style={{fontSize:'0.75rem',color:'var(--text2)',marginTop:2}}>
            Checks data integrity, configuration, connectivity and storage health.
          </div>
        </div>
        <button className="btn btn-gold" onClick={runDiagnostics} disabled={running} style={{flexShrink:0}}>
          {running?'⏳ Running…':'▶ Run Again'}
        </button>
      </div>

      {/* Summary bar */}
      {results&&(
        <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:10,marginBottom:16}}>
          {[
            {label:'Total Checks',value:total,color:'var(--text)',bg:'var(--navy3)'},
            {label:'Passed',value:pass,color:'var(--green)',bg:'rgba(34,197,94,0.08)'},
            {label:'Warnings',value:warn,color:'var(--gold)',bg:'rgba(234,179,8,0.08)'},
            {label:'Failed',value:fail,color:'var(--rose)',bg:'rgba(239,68,68,0.08)'},
          ].map((s,i)=>(
            <div key={i} style={{background:s.bg,borderRadius:9,padding:'12px',textAlign:'center',border:`1px solid ${s.color}33`}}>
              <div style={{fontSize:'1.4rem',fontWeight:800,color:s.color}}>{running&&i>0?'…':s.value}</div>
              <div style={{fontSize:'0.65rem',color:'var(--text2)',textTransform:'uppercase',letterSpacing:'1px',fontWeight:600,marginTop:3}}>{s.label}</div>
            </div>
          ))}
        </div>
      )}

      {/* Overall status banner */}
      {results&&!running&&(
        <div style={{background:statusBg(overallStatus),border:`1px solid ${statusBorder(overallStatus)}`,borderRadius:10,padding:'12px 16px',marginBottom:16,display:'flex',alignItems:'center',gap:10}}>
          <span style={{fontSize:'1.4rem'}}>{statusIcon(overallStatus)}</span>
          <div>
            <div style={{fontWeight:700,color:statusColor(overallStatus)}}>
              {overallStatus==='pass'?'System Healthy — All checks passed':overallStatus==='warn'?`System has ${warn} warning${warn>1?'s':''} — review below`:`${fail} critical issue${fail>1?'s':''} detected — action required`}
            </div>
            <div style={{fontSize:'0.72rem',color:'var(--text2)',marginTop:2}}>
              Last run: {new Date().toLocaleTimeString()}
            </div>
          </div>
        </div>
      )}

      {/* Check results */}
      {running&&!results&&(
        <div className="empty"><div className="empty-icon">⏳</div>Running diagnostics…</div>
      )}

      {allChecks.length>0&&(
        <div style={{display:'flex',flexDirection:'column',gap:8}}>
          {allChecks.map((c,i)=>(
            <div key={c.id||i} style={{background:statusBg(c.status),border:`1px solid ${statusBorder(c.status)}`,borderRadius:9,padding:'12px 14px',display:'flex',alignItems:'flex-start',gap:10}}>
              <span style={{fontSize:'1.1rem',flexShrink:0,marginTop:1}}>{statusIcon(c.status)}</span>
              <div style={{flex:1}}>
                <div style={{fontWeight:700,fontSize:'0.85rem',color:statusColor(c.status)}}>{c.label}</div>
                <div style={{fontSize:'0.75rem',color:'var(--text)',marginTop:3,lineHeight:1.5}}>{c.msg}</div>
                {c.link&&(
                  <a href={c.link} target="_blank" rel="noreferrer"
                    style={{fontSize:'0.7rem',color:'var(--teal)',marginTop:4,display:'inline-block',textDecoration:'underline'}}>
                    Open endpoint ↗
                  </a>
                )}
              </div>
              {c.status==='warn'&&c.id==='at_config'&&(
                <div style={{fontSize:'0.68rem',color:'var(--gold)',background:'rgba(234,179,8,0.1)',borderRadius:6,padding:'4px 8px',flexShrink:0}}>→ AT Settings</div>
              )}
              {c.status==='warn'&&c.id==='sync_config'&&(
                <div style={{fontSize:'0.68rem',color:'var(--gold)',background:'rgba(234,179,8,0.1)',borderRadius:6,padding:'4px 8px',flexShrink:0}}>→ AT Settings</div>
              )}
            </div>
          ))}
          {/* Proxy still loading */}
          {results&&!proxyRes&&(
            <div style={{background:'rgba(14,116,144,0.07)',border:'1px solid rgba(14,116,144,0.2)',borderRadius:9,padding:'12px 14px',display:'flex',alignItems:'center',gap:10}}>
              <span style={{fontSize:'1.1rem'}}>⏳</span>
              <div>
                <div style={{fontWeight:700,fontSize:'0.85rem',color:'var(--teal)'}}>Proxy Server</div>
                <div style={{fontSize:'0.75rem',color:'var(--text2)'}}>Pinging server…</div>
              </div>
            </div>
          )}
        </div>
      )}

      {/* Quick actions */}
      {results&&!running&&(
        <div style={{marginTop:18,background:'var(--navy3)',borderRadius:10,padding:'14px 16px',border:'1px solid var(--border)'}}>
          <div style={{fontWeight:700,fontSize:'0.82rem',marginBottom:10,color:'var(--text2)',textTransform:'uppercase',letterSpacing:'1px'}}>Quick Actions</div>
          <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
            {fail>0&&<div style={{fontSize:'0.75rem',color:'var(--rose)',background:'rgba(239,68,68,0.08)',borderRadius:7,padding:'6px 10px'}}>
              ❌ Fix critical issues first — check AT Settings for proxy/sync config
            </div>}
            {warn>0&&orphanData(exams,students,fees)&&<div style={{fontSize:'0.75rem',color:'var(--gold)',background:'rgba(234,179,8,0.08)',borderRadius:7,padding:'6px 10px'}}>
              ⚠️ Orphaned records found — these were likely from deleted students
            </div>}
            <div style={{fontSize:'0.75rem',color:'var(--teal)',background:'rgba(14,116,144,0.08)',borderRadius:7,padding:'6px 10px'}}>
              ℹ️ Run diagnostics after any major data changes to confirm system health
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function orphanData(exams,students,fees){
  const ids=new Set(students.map(s=>s.id));
  return exams.some(e=>!ids.has(e.studentId))||fees.some(f=>!ids.has(f.studentId));
}

// ──────────── MESSAGE LOG ────────────
function MessageLog({messages, students}){
  const [search,setSearch] = useState('');
  const [typeFilter,setTypeFilter] = useState('');

  const filtered = messages.filter(m=>{
    const q = search.toLowerCase();
    return (!q || m.subject.toLowerCase().includes(q) || m.body.toLowerCase().includes(q))
      && (!typeFilter || m.type===typeFilter);
  });

  const types = [...new Set(messages.map(m=>m.type))];

  const typeColor = {fees:'gold',general:'teal',reminder:'teal',alert:'rose',announcement:'purple'};
  const typeIcon  = {fees:'💰',general:'📢',reminder:'🔔',alert:'⚠️',announcement:'📣'};

  return(
    <div>
      <div className="section-header">
        <h2>Message Log ({filtered.length})</h2>
        <div className="flex gap-8" style={{flexWrap:'wrap'}}>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search messages…" style={{width:200}}/>
          <select value={typeFilter} onChange={e=>setTypeFilter(e.target.value)}>
            <option value="">All Types</option>
            {types.map(t=><option key={t} value={t}>{typeIcon[t]||'📨'} {t.charAt(0).toUpperCase()+t.slice(1)}</option>)}
          </select>
        </div>
      </div>

      {filtered.length===0&&<div className="empty"><div className="empty-icon">📋</div>No messages found</div>}

      <div style={{display:'flex',flexDirection:'column',gap:10}}>
        {filtered.map((m,i)=>(
          <div key={m.id||i} style={{background:'var(--navy3)',borderRadius:10,padding:'14px 16px',border:'1px solid var(--border)'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:10,marginBottom:8}}>
              <div style={{flex:1}}>
                <div style={{fontWeight:700,fontSize:'0.9rem',marginBottom:4}}>{m.subject}</div>
                <div style={{display:'flex',gap:6,flexWrap:'wrap',alignItems:'center'}}>
                  <span className={`badge badge-${typeColor[m.type]||'teal'}`}>{typeIcon[m.type]||'📨'} {m.type}</span>
                  <span style={{fontSize:'0.7rem',color:'var(--text2)'}}>📅 {m.date?fmtDate(m.date):''}</span>
                  <span style={{fontSize:'0.7rem',color:'var(--text2)'}}>👥 {m.recipientCount||0} recipients</span>
                  {m.sentBy&&<span style={{fontSize:'0.7rem',color:'var(--text2)'}}>by {m.sentBy}</span>}
                </div>
              </div>
              <span className={`badge badge-${m.status==='sent'?'green':'text2'}`} style={{flexShrink:0,fontSize:'0.68rem'}}>
                {m.status==='sent'?'✅ Sent':'⏳ '+m.status}
              </span>
            </div>
            <div style={{fontSize:'0.78rem',color:'var(--text2)',background:'var(--navy2)',borderRadius:7,padding:'10px 12px',lineHeight:1.6}}>
              {m.body}
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}
